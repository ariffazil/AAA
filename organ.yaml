schema_version: 1
organ: aaa
repo: ariffazil/AAA
role: control_plane
authority_ceiling: DISPLAY_ONLY
default_branch: main

interfaces:
  registry: federation/organs.yaml
  schemas: federation/*.schema.json

owned_domains:
  - federation_registry
  - a2a_routing
  - cockpit_display
  - schema_validation
  - agent_identity

forbidden_domains:
  - constitutional_judgment
  - engineering_execution
  - earth_evidence
  - capital_allocation
  - vault999_seal

build:
  runtime: node-22
  install: npm ci
  command: npm run build
  test: npm run lint && npm run build
  artifact: dist/

rollback:
  strategy: previous_verified_digest
