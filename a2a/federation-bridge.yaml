version: 1

description: A2A federation contract for AAA agents

runtime_policy:
  remote_execution_enabled: false

bindings:
  - agent_id: aaa-gateway
    host_binding: openclaw-gateway
    type: control-plane
    protocol_version: "1.0"
    can_send_tasks: true
    can_receive_results: true
    auth_required: true

  - agent_id: geox-witness
    host_binding: geox-acp
    type: domain-witness
    protocol_version: "1.0"
    can_send_tasks: true
    can_receive_results: true
    auth_required: true

  - agent_id: wealth-witness
    host_binding: wealth-acp
    type: domain-witness
    protocol_version: "1.0"
    can_send_tasks: true
    can_receive_results: true
    auth_required: true

peers:
  - agent_id: geox-witness
    type: domain-witness
    protocol_version: "1.0"
    can_send_tasks: true
    can_receive_results: true
    auth_required: true

  - agent_id: arifos-kernel
    type: governance
    protocol_version: "1.0"
    can_send_tasks: true
    can_receive_results: true
    auth_required: true

  - agent_id: aaa-gateway
    type: control-plane
    protocol_version: "1.0"
    can_send_tasks: true
    can_receive_results: true
    auth_required: true
