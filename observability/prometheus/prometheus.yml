# observability/prometheus/prometheus.yml
# arifOS Prometheus scrape configuration — bare-metal, source-controlled.
#
# Reconfirmed against the live arifOS runtime at 127.0.0.1:8088 which exposes
# Prometheus exposition format on the standard text endpoint (NOT the previously
# assumed custom JSON path, and NOT over HTTPS — both assumptions removed).
#
# Targets:
#   arifos-local      — 127.0.0.1:8088/metrics  (arifOS kernel, primary)
#   a-forge-local     — 127.0.0.1:7071/metrics  (A-FORGE actuator, if exposed)
#   geox-local        — 127.0.0.1:8081/metrics  (GEOX organ, if exposed)
#   wealth-local      — 127.0.0.1:18082/metrics (WEALTH organ, if exposed)
#   well-local        — 127.0.0.1:18083/metrics (WELL organ, if exposed)
#   aaa-local         — 127.0.0.1:3001/metrics  (AAA gateway, if exposed)
#   prometheus-self   — 127.0.0.1:9090/metrics  (self-monitoring)
#
# IMPORTANT: Prometheus is observability-only and read-only. No write access
# to the system. Governance lives in arifOS, not in Prometheus.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    system: "arifOS"
    environment: "production"
    stack: "observability-only"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "nine_signal_alerts.yml"

scrape_configs:
  # ── arifOS kernel (primary) ──────────────────────────────────────────────
  # /metrics endpoint on the constitutional kernel. Emits the verified series:
  #   arifos_genius_score, arifos_entropy_delta, arifos_humility_band,
  #   arifos_peace_squared, arifos_empathy_quotient, arifos_w3_score,
  #   arifos_verdicts_total, arifos_hold_queue_depth,
  #   arifos_floor_violations_total, arifos_void_events_total,
  #   arifos_sabar_events_total, arifos_sessions_active,
  #   arifos_vault_entries_total, arifos_machine_faults_total,
  #   arifos_requests_total, arifos_metabolic_loop_seconds,
  #   arifos_m3_tokens_total, arifos_m3_calls_total,
  #   arifos_m3_fallback_total, arifos_multimodal_calls_total,
  #   arifos_merkle_integrity_checks_total.
  # Source-defined but absent until first event (arifOS not deployed yet):
  #   arifos_tearframe         (gauge,  set at ATLAS333 stage 7 completion)
  #   arifos_rasa_events_total (counter, inc when log_shadow() writes JSONL)
  #   arifos_scar_candidates_total (counter, inc after vault999/scars/ write)
  - job_name: "arifos-local"
    metrics_path: "/metrics"
    scheme: "http"
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: false
    honor_timestamps: true
    static_configs:
      - targets:
          - "127.0.0.1:8088"
        labels:
          service: "arifos-kernel"
          domain: "governance"
          observability_layer: "prometheus-observability-only"

  # ── A-FORGE actuator ─────────────────────────────────────────────────────
  - job_name: "aforge-local"
    metrics_path: "/metrics"
    scheme: "http"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "127.0.0.1:7071"
        labels:
          service: "aforge-actuator"
          domain: "execution"
          observability_layer: "prometheus-observability-only"

  # ── GEOX organ ───────────────────────────────────────────────────────────
  - job_name: "geox-local"
    metrics_path: "/metrics"
    scheme: "http"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "127.0.0.1:8081"
        labels:
          service: "geox-organ"
          domain: "subsurface"
          observability_layer: "prometheus-observability-only"

  # ── WEALTH organ ─────────────────────────────────────────────────────────
  - job_name: "wealth-local"
    metrics_path: "/metrics"
    scheme: "http"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "127.0.0.1:18082"
        labels:
          service: "wealth-organ"
          domain: "capital"
          observability_layer: "prometheus-observability-only"

  # ── WELL organ ───────────────────────────────────────────────────────────
  - job_name: "well-local"
    metrics_path: "/metrics"
    scheme: "http"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "127.0.0.1:18083"
        labels:
          service: "well-organ"
          domain: "human-readiness"
          observability_layer: "prometheus-observability-only"

  # ── AAA gateway ──────────────────────────────────────────────────────────
  - job_name: "aaa-local"
    metrics_path: "/metrics"
    scheme: "http"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "127.0.0.1:3001"
        labels:
          service: "aaa-gateway"
          domain: "control-plane"
          observability_layer: "prometheus-observability-only"

  # ── Prometheus self-monitoring ───────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "127.0.0.1:9090"
        labels:
          service: "prometheus"
          self_monitoring: "true"
          observability_layer: "prometheus-observability-only"
