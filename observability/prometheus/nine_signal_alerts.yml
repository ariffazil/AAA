# observability/prometheus/nine_signal_alerts.yml
# arifOS Nine-Signal alert rules.
#
# Source-controlled reconciliation: every expression below references a
# metric series actually emitted by the arifOS kernel at 127.0.0.1:8088/metrics.
# Verified live series (from `curl -s http://127.0.0.1:8088/metrics`):
#
#   arifos_genius_score            (gauge, F8 GENIUS >= 0.80)
#   arifos_entropy_delta           (gauge, F4 CLARITY dS <= 0)
#   arifos_humility_band           (gauge, F7 HUMILITY band [0.03, 0.05])
#   arifos_peace_squared           (gauge, F5 PEACE^2 >= 1.0)
#   arifos_empathy_quotient        (gauge, F5 empathy floor)
#   arifos_w3_score                (histogram, F3 WITNESS SEAL >= 0.95)
#   arifos_verdicts_total          (counter, all verdict classes)
#   arifos_hold_queue_depth        (gauge, F13 SOVEREIGN 888_HOLD)
#   arifos_floor_violations_total  (counter, F1-F13 breach counter)
#   arifos_void_events_total       (counter, VOID verdicts)
#   arifos_sabar_events_total      (counter, SABAR cooling)
#   arifos_sessions_active         (gauge, active kernel sessions)
#   arifos_vault_entries_total     (gauge, VAULT999 sealed records)
#   arifos_machine_faults_total    (counter, substrate faults)
#   arifos_requests_total          (counter, total incoming requests)
#   arifos_merkle_integrity_checks_total (counter, vault chain checks)
#
# The following series are deliberately NOT used here because they are
# not currently emitted by the runtime:
#   arifos_tearframe, arifos_rasa_events_total, arifos_scar_candidates_total.
# Referencing them would produce permanently-absent series and alerts that
# never fire (or false-positive fallbacks), violating F2 TRUTH.

groups:
  - name: nine_signal_floors
    interval: 30s
    rules:
      # --- F8 GENIUS --- G score below floor
      - alert: NineSignalGeniusFloorBreach
        expr: arifos_genius_score < 0.80
        for: 5m
        labels:
          severity: critical
          floor: F8
          signal: genius_score
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS GENIUS score below constitutional floor (F8)"
          description: |
            arifos_genius_score = {{ $value }} has been below 0.80 for 5 minutes.
            F8 GENIUS floor requires G >= 0.80 for any SEAL-grade action.
            This is a constitutional floor breach (F1 AMANAH will begin to refuse
            mutating calls if the breach persists).

      # --- F4 CLARITY --- entropy rising
      - alert: NineSignalEntropyRising
        expr: arifos_entropy_delta > 0.30
        for: 10m
        labels:
          severity: warning
          floor: F4
          signal: entropy_delta
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS workspace entropy dS > 0.30 (F4 CLARITY)"
          description: |
            arifos_entropy_delta = {{ $value }} sustained > 0.30 for 10m.
            F4 CLARITY requires dS <= 0. Workspace is accumulating noise.

      # --- F7 HUMILITY --- band broken (under-confidence)
      - alert: NineSignalHumilityBandLow
        expr: arifos_humility_band < 0.03
        for: 10m
        labels:
          severity: warning
          floor: F7
          signal: humility_band
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS humility band below lower bound (F7)"
          description: |
            arifos_humility_band = {{ $value }} < 0.03 for 10m.
            F7 HUMILITY band is [0.03, 0.05]. Below band = under-confidence.

      # --- F7 HUMILITY --- band broken (over-confidence)
      - alert: NineSignalHumilityBandHigh
        expr: arifos_humility_band > 0.05
        for: 10m
        labels:
          severity: warning
          floor: F7
          signal: humility_band
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS humility band above upper bound (F7)"
          description: |
            arifos_humility_band = {{ $value }} > 0.05 for 10m.
            F7 HUMILITY band is [0.03, 0.05]. Above band = over-confidence.

      # --- F5 PEACE^2 --- stakeholder stability floor
      - alert: NineSignalPeaceSquaredFloorBreach
        expr: arifos_peace_squared < 1.0
        for: 10m
        labels:
          severity: critical
          floor: F5
          signal: peace_squared
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS PEACE^2 below 1.0 (F5 stakeholder stability)"
          description: |
            arifos_peace_squared = {{ $value }} < 1.0 for 10m.
            F5 PEACE^2 requires >= 1.0. A weakest-stakeholder guard is failing.

      # --- F5 empathy quotient floor
      - alert: NineSignalEmpathyLow
        expr: arifos_empathy_quotient < 0.50
        for: 15m
        labels:
          severity: warning
          floor: F5
          signal: empathy_quotient
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS empathy quotient < 0.50 (F5 PEACE^2)"
          description: |
            arifos_empathy_quotient = {{ $value }} < 0.50 for 15m.
            Stakeholder care level is below acceptable band.

      # --- F3 WITNESS --- W^3 95th percentile below SEAL threshold
      - alert: NineSignalW3BelowSeal
        expr: histogram_quantile(0.95, sum by (le) (rate(arifos_w3_score_bucket[10m]))) < 0.95
        for: 10m
        labels:
          severity: warning
          floor: F3
          signal: w3_score
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS tri-witness W^3 p95 < 0.95 (F3 WITNESS)"
          description: |
            95th percentile of arifos_w3_score has been below 0.95 for 10m.
            SEAL-grade actions require W^3 >= 0.95 (all three witness channels
            present). Channel degradation should be investigated.

      # --- F2/F9 --- VOID verdict burst
      - alert: NineSignalVoidBurst
        expr: rate(arifos_void_events_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          floor: F2
          signal: void_events_total
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS VOID verdicts bursting (F2 TRUTH / F9 ANTI-HANTU)"
          description: |
            rate(arifos_void_events_total[5m]) = {{ $value }} > 0.05 sustained 2m.
            VOID verdicts signal constitutional violations (F2/L11/L12/L13).
            This is rare and worth sovereign review.

      # --- F1-F13 --- floor violation burst
      - alert: NineSignalFloorViolationsRising
        expr: rate(arifos_floor_violations_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          floor: F1
          signal: floor_violations_total
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS constitutional floor violation rate elevated"
          description: |
            rate(arifos_floor_violations_total[5m]) = {{ $value }} > 0.05 for 5m.
            Multiple distinct tools/agents are tripping the same floor.

  - name: nine_signal_lifecycle
    interval: 30s
    rules:
      # --- F13 SOVEREIGN --- 888_HOLD queue non-empty
      - alert: NineSignalHoldQueueGrowing
        expr: arifos_hold_queue_depth > 0
        for: 10m
        labels:
          severity: warning
          floor: F13
          signal: hold_queue_depth
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS 888_HOLD queue non-empty > 10m (F13 SOVEREIGN)"
          description: |
            arifos_hold_queue_depth = {{ $value }} events awaiting sovereign ratification.
            Items older than 24h will REPLAY_REQUIRED per F1.

      # --- substrate --- machine faults rate
      - alert: NineSignalMachineFaultsRising
        expr: rate(arifos_machine_faults_total[10m]) > 0.05
        for: 10m
        labels:
          severity: warning
          floor: F1
          signal: machine_faults_total
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS machine-fault rate elevated"
          description: |
            rate(arifos_machine_faults_total[10m]) = {{ $value }} > 0.05 for 10m.
            Machine faults are NOT mapped to VOID (per substrate doctrine); they
            need human attention but should not generate constitutional noise.

      # --- substrate --- SABAR cooling rate
      - alert: NineSignalSabarCoolingRising
        expr: rate(arifos_sabar_events_total[10m]) > 0.10
        for: 10m
        labels:
          severity: info
          floor: F4
          signal: sabar_events_total
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS SABAR cooling events elevated"
          description: |
            rate(arifos_sabar_events_total[10m]) = {{ $value }} > 0.10 for 10m.
            Temporary thermodynamic instability. Cooling chain is doing its job,
            but the upstream drift dimension should be reviewed.

  - name: nine_signal_infrastructure
    interval: 30s
    rules:
      # --- kernel scrape itself is down
      - alert: NineSignalArifosKernelDown
        expr: up{job="arifos-local"} == 0
        for: 2m
        labels:
          severity: critical
          signal: scrape_up
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS kernel scrape target down (127.0.0.1:8088)"
          description: |
            Prometheus cannot scrape arifos-local (127.0.0.1:8088/metrics) for 2m.
            All Nine-Signal metrics are stale. Check the arifOS systemd service.

      # --- session backlog (only useful if kernel is busy)
      - alert: NineSignalSessionsBacklog
        expr: arifos_sessions_active > 1000
        for: 5m
        labels:
          severity: warning
          signal: sessions_active
          observability_layer: prometheus-observability-only
        annotations:
          summary: "arifOS active sessions > 1000 for 5m"
          description: |
            arifos_sessions_active = {{ $value }} for 5m.
            Tune session TTL or investigate runaway agent loops.
