# observability/grafana/provisioning/datasources/prometheus.yml
# Grafana datasource provisioning for arifOS.
#
# Prometheus is exposed on the bare-metal loopback at http://127.0.0.1:9090
# (not behind a Cloudflare tunnel, not via mTLS). The datasource is provisioned
# from this file at Grafana startup; no aliases, no fake defaults.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 30s
      httpMethod: POST
      manageAlerts: true
