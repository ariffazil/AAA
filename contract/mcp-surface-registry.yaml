# CROSS-ORGAN CONTRACTS
contracts:
  identity_envelope:
    required: [actor_id, sovereign_id, session_id, delegation_mode]
    rule: "missing → anonymous OBSERVE_ONLY; conflicting → HOLD"
  
  evidence_envelope:
    required: [tool_name, domain, epistemic_tag, evidence_quality, source_attribution]
    rule: "every tool output must carry this"
  
  verdict_states: [SEAL, HOLD, SABAR, VOID, UNKNOWN]
  
  authority_states:
    fields: [identity_band, session_band, tool_action_class, mutation_allowed, seal_allowed, effective_authority]
    rule: "only effective_authority controls execution"

  transport_rules:
    stateless: [arifos, wealth, well]  # no session required
    session: [geox, aforge]            # Mcp-Session-Id required
    na: [aaa]                          # A2A only

