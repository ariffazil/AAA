# ─── CONFORMANCE TESTS ────────────────────────────────────────────────
conformance_tests:
  version: "1.0"
  tests:
    - id: CT-01
      name: connector_discovery
      desc: "Every organ responds to tools/list with correct count"
      check: "tools/list returns exactly tool_count tools per organ"

    - id: CT-02
      name: tool_name_equality
      desc: "Exported names match canonical names exactly"
      check: "exported_tools == canonical_tools (no phantoms, no missing)"

    - id: CT-03
      name: safe_callability
      desc: "Every canonical tool responds to a safe invocation"
      check: "Call each tool with minimal valid params, expect 200"

    - id: CT-04
      name: actor_propagation
      desc: "Actor identity survives full trajectory"
      check: "Init session as ARIF → call organ tool → verify actor_id in receipt"

    - id: CT-05
      name: session_propagation
      desc: "Session ID survives full trajectory"
      check: "Init session → call organ → verify session_id in receipt"

    - id: CT-06
      name: evidence_envelope
      desc: "Every tool output carries evidence envelope"
      check: "All outputs have tool_name, epistemic_tag, evidence_quality"

    - id: CT-07
      name: authority_reduction
      desc: "Missing identity reduces authority to OBSERVE_ONLY"
      check: "Call without identity → verify effective_authority = OBSERVE_ONLY"

    - id: CT-08
      name: dry_run_default
      desc: "A-FORGE defaults to dry_run"
      check: "forge_execute without explicit mode → verify dry_run behavior"

    - id: CT-09
      name: receipt_write
      desc: "VAULT999 receipt write succeeds"
      check: "forge_vault(mode=seal) → verify receipt in chain"

    - id: CT-10
      name: receipt_replay
      desc: "VAULT999 receipt replay succeeds"
      check: "Read receipt → verify all fields present → verify chain integrity"

# ─── DEPLOYMENT PROVENANCE ────────────────────────────────────────────
