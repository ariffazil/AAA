# FROZEN CONTRACT — arifOS Federation
# Version: 2026.07.14-contract-v1
# State: FROZEN — no organ may deviate from this surface without F13 approval
# Authority: F13 SOVEREIGN (Arif)
# Location: /root/AAA/contract/frozen-contract.yaml
#
# RULE: All organ exports, capability graphs, connector registrations,
#       and conformance tests derive from this file. No separate manifests.
#       If it's not here, it doesn't exist on the public surface.

contract:
  epoch: "2026.07.14"
  version: "1.0.0"
  frozen_at: "2026-07-14T16:00:00+08:00"
  frozen_by: "ARIF"
  status: FROZEN
  rule: >
    This contract defines the PUBLIC surface of every organ.
    Internal tools may exist beyond this list but MUST NOT be exported.
    All conformance tests derive from this file.
    Deviation requires F13 approval and contract version bump.

# ─── IDENTITY ENVELOPE ───────────────────────────────────────────────
identity_envelope:
  version: "1.0"
  required_fields:
    actor_id: { type: string, description: "Caller identity (e.g. ARIF)" }
    sovereign_id: { type: string, description: "F13 sovereign (ARIF)" }
    caller_actor_id: { type: string, description: "Transport layer identity" }
    executor_actor_id: { type: string, description: "Organ executing the call" }
    session_id: { type: string, description: "Kernel-born session ID" }
    session_token_hash: { type: string, description: "SHA-256 of session token" }
    delegation_mode: { type: string, enum: [external_instrument, internal_agent, sovereign_direct] }
  rules:
    - "missing identity → anonymous OBSERVE_ONLY"
    - "conflicting identity → HOLD (never silently repair)"
    - "matching identity → inherit session authority"

# ─── AUTHORITY STATES ─────────────────────────────────────────────────
authority_states:
  version: "1.0"
  fields:
    identity_band: { type: string, enum: [FULL, PARTIAL, ANONYMOUS] }
    session_band: { type: string, enum: [OBSERVE_ONLY, ANALYZE, RECOMMEND, REVERSIBLE_EXECUTE, CONSEQUENTIAL] }
    tool_action_class: { type: string, enum: [OBSERVE, PREPARE, MUTATE, EXTERNAL_SIDE_EFFECT, IRREVERSIBLE] }
    mutation_allowed: { type: boolean }
    seal_allowed: { type: boolean }
    effective_authority: { type: string, description: "Only this field controls execution" }
  rule: >
    Only effective_authority controls execution.
    All other fields are informational.

# ─── VERDICT STATES ───────────────────────────────────────────────────
verdict_states:
  version: "1.0"
  values: [SEAL, HOLD, SABAR, VOID, UNKNOWN]
  rules:
    - "SEAL: proceed with action"
    - "HOLD: wait for human or more evidence"
    - "SABAR: patience, de-escalate"
    - "VOID: reject, never emit"
    - "UNKNOWN: insufficient evidence to judge"

# ─── EVIDENCE ENVELOPE ────────────────────────────────────────────────
evidence_envelope:
  version: "1.0"
  required_fields:
    tool_name: { type: string, description: "Canonical tool that produced this" }
    domain: { type: string, description: "Knowledge domain (geology, capital, health, meta)" }
    epistemic_tag: { type: string, enum: [OBSERVED, DERIVED, INTERPRETED, SPECULATIVE, UNKNOWN] }
    evidence_quality: { type: string, enum: [STRONG, MODERATE, WEAK, UNVERIFIABLE] }
    source_attribution: { type: "array[string]", description: "Evidence sources" }
    timestamp: { type: string, format: "ISO-8601" }
    actor_id: { type: string }
    session_id: { type: string }
  rule: >
    Every tool output MUST carry this envelope.
    No output without provenance.

# ─── RECEIPT SCHEMA ───────────────────────────────────────────────────
receipt_schema:
  version: "1.0"
  required_fields:
    receipt_id: { type: string, description: "Unique receipt identifier" }
    action: { type: string, description: "What was done" }
    actor_id: { type: string }
    session_id: { type: string }
    verdict: { type: string, enum: [SEAL, HOLD, SABAR, VOID, UNKNOWN] }
    evidence_refs: { type: "array[string]", description: "Evidence IDs" }
    timestamp: { type: string, format: "ISO-8601" }
    reversible: { type: boolean }
    rollback_plan: { type: string, nullable: true }

