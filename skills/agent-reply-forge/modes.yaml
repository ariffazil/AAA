## Mode Architecture v2.0

Two orthogonal mode systems are used together:

| System | Field | Modes | Purpose |
|--------|-------|-------|---------|
| **Routing Mode** | `Mode:` | → ↩ 📢 ⟋ ⚠ ✅ ❌ | WHO is this really for? (routing) |
| **Intent Mode** | `Intent:` | HEALTH INCIDENT PROPOSAL ESCALATION AUDIT PLAN EXPLAIN DENY META | WHAT KIND of communication? (tone) |

Both are REQUIRED in every agent message.

---

## Routing Modes (Mode: field)

| Mode | Code | Who Sees It | Primary Recipient | Arif Status |
|------|------|-------------|-------------------|-------------|
| DIRECT | `→` | Target (in group) | Single human or agent | CC if Arif not target |
| REPLY | `↩` | Everyone in group | Original sender | CC if not target |
| BROADCAST | `📢` | Everyone in group | Group / all agents | Always CC |
| HANDOFF | `⟋` | Everyone in group | Receiving agent | Always CC |
| ESCALATE | `⚠` | Everyone in group | Arif + relevant agents | **TO Arif directly** |
| ACK | `✅` | Everyone in group | Original sender | CC |
| NACK | `❌` | Everyone in group | Original sender | **TO Arif** |

### Routing Mode Behavior

| Mode | Pause Exec? | Tool Execution | ACK Required | Timeout |
|------|-------------|---------------|--------------|---------|
| `→ DIRECT` | No | Yes | Preferred | 30s |
| `↩ REPLY` | No | Yes | No | 20s |
| `📢 BROADCAST` | No | Read-only only | No | — |
| `⟋ HANDOFF` | **Yes** | **No until ACK** | **Yes** | 60s → auto-escalate |
| `⚠ ESCALATE` | **Yes — BLOCKED** | **No** | **TO Arif** | 5min hard |
| `✅ ACK` | No | Confirmatory only | No | 10s |
| `❌ NACK` | **Yes — BLOCKED** | **No** | **TO Arif** | 10s |

