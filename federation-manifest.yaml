# Cross-organ contracts
contracts:
  identity_envelope:
    required_fields: [actor_id, sovereign_id, session_id, delegation_mode]
    version: "1.0"
  
  evidence_receipt:
    required_fields: [tool_name, domain, epistemic_tag, evidence_quality, source_attribution]
    version: "1.0"
  
  verdict_enums: [SEAL, HOLD, SABAR, VOID, UNKNOWN]
  
  autonomy_bands: [OBSERVE_ONLY, ANALYZE, RECOMMEND, REVERSIBLE_EXECUTE, CONSEQUENTIAL]

  connector_diagnostic:
    required_fields:
      - status: [PASS, DRIFT, FAIL]
      - transport.reachable
      - transport.protocol
      - identity.actor_propagation_test
