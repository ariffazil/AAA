# === TOOLS (governance gate, not execution) ===
tools:
  forge_security_classify_tool:
    name: "forge_security_classify_tool"
    description: "Classify a security tool or request against the EHT hazard taxonomy. Returns band (GREEN/YELLOW/ORANGE/RED/BLACK/VOID), agentic posture, and allowed/blocked patterns."
    domain: "aforge"
    action_class: OBSERVE
    authority_required: "none (classification is read-only)"
    input_schema:
      type: object
      properties:
        tool_name:
          type: string
          description: "Name of the tool or request to classify"
        category:
          type: string
          description: "Optional EHT category hint (EHT-01 through EHT-14, EHT-PHISHING)"
        intent:
          type: string
          description: "What the user intends to do with this tool"
        scope:
          type: string
          description: "Target scope (owned infrastructure, third-party, lab, production)"
      required: ["tool_name", "intent"]
    output:
      band: "GREEN|YELLOW|ORANGE|RED|BLACK|VOID"
      posture: "agentic governance posture per category"
      auto_allowed: ["list of auto-allowed actions"]
      hold_conditions: ["list of conditions requiring HOLD"]
      void_patterns: ["list of forbidden patterns"]
      floor_check:
        F1: "reversible? boolean"
        F5: "harm potential? low|medium|high|critical"
        F9: "deception risk? boolean"
        F12: "injection risk? low|medium|high"

  forge_security_preflight:
    name: "forge_security_preflight"
    description: "Preflight check: scan request against forbidden patterns, classify hazard band, verify scope + authorization. Returns GO/NOGO with reasoning."
    domain: "aforge"
    action_class: OBSERVE
    authority_required: "none (check is read-only)"
    input_schema:
      type: object
      properties:
        request:
          type: string
          description: "Full request text or tool invocation to check"
        scope_evidence:
          type: string
          description: "Evidence of authorization (contract, scope doc, RoE)"
        target:
          type: string
          description: "Target identifier (IP, domain, system name)"
      required: ["request"]
    output:
      verdict: "GO|HOLD|VOID"
      band: "GREEN|YELLOW|ORANGE|RED|BLACK|VOID"
      matched_patterns: ["list of matched forbidden patterns, if any"]
      required_authority: "none|scope_doc|lease|seal|f13_override"
      reasoning: "one-line explanation"
      next_step: "proceed|hold_pending_scope|hold_pending_seal|blocked_permanent"

# === PROMPTS (agent instructions, not tools) ===
prompts:
  classify_offsec_request:
    description: "Classify an offensive security request against the EHT taxonomy"
    template: |
      You are a security governance classifier governed by arifOS F1-F13.
      Classify this request against the EHT hazard taxonomy (tool_hazard_v1.yaml).
      Check against forbidden patterns (forbidden_patterns_v1.yaml).
      Return: BAND, POSTURE, VERDICT (GO/HOLD/VOID), REASONING.
      Request: {request}
      Scope: {scope}
      Target: {target}

  osint_passive_recon_boundary:
    description: "Boundary prompt for OSINT/passive recon — what's allowed"
    template: |
      OSINT and passive reconnaissance BOUNDARY:
      ALLOWED: whois on owned domains, DNS enumeration of owned infra, SSL CT logs, Shodan for owned IPs, Google dorking for owned-domain exposure assessment.
      HOLD: active scanning of third-party targets, port scanning external infra, automated scraping, using dorks to find exploitable targets.
      VOID: credential harvesting via recon, social engineering info gathering, targeting specific orgs without authorization.
      Your request: {request}

  incident_response_redirect:
    description: "Redirect offensive tool requests to defensive incident response workflow"
    template: |
      This request appears to involve offensive security tooling.
      REDIRECTING to defensive workflow:
      1. Is there an active security incident? → incident response triage
      2. Is this a penetration test? → require scope document + RoE
      3. Is this CTF/learning? → lab-only, no production bridge
      4. Is this defensive research? → OSINT channels only
      Original request: {request}

# === CONSTITUTIONAL GATES ===
