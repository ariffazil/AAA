version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kuala_Lumpur"
    open-pull-requests-limit: 10
    labels: ["deps", "dependencies"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      all-npm-patch:
        update-types: ["patch"]
      all-npm-minor:
        update-types: ["minor"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kuala_Lumpur"
    open-pull-requests-limit: 5
    labels: ["deps", "ci"]
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      all-actions:
        patterns: ["*"]
