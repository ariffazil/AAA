name: External Witness Attestation (Gödel Lock)

> **FORGED 2026-07-15.** The kernel refuses to self-seal. This workflow
> enforces the W³ External channel for any PR that touches protected paths.

on:
  pull_request:
    types: [opened, edited, synchronize, labeled]
    branches: [main, master]

jobs:
  witness:
    name: External Witness Check (W³ channel)
    runs-on: ubuntu-latest
    steps:
      - name: Probe arifOS kernel Gödel lock
        id: kernel
        run: |
          response=$(curl -sf -m 5 http://localhost:8088/health 2>/dev/null || echo "KERNEL_UNREACHABLE")
          if echo "$response" | grep -qi "godel\|witness"; then
            echo "✓ arifOS kernel reports Gödel lock active"
            echo "kernel=godel_active" >> "$GITHUB_OUTPUT"
          else
            echo "⚠ arifOS kernel unreachable (acceptable for external PRs); falling back to comment/label check"
            echo "kernel=unreachable" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for external witness attestation
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = context.repo;

            // Method 1: label `external-witness-attested`
            const hasLabel = pr.labels && pr.labels.some(l => l.name === 'external-witness-attested');
            if (hasLabel) {
              core.info(`✓ External witness label found on PR #${pr.number}`);
              return;
            }

            // Method 2: comment containing "EXTERNAL_WITNESS:" token
            const comments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: pr.number
            });
            const witnessComment = comments.data.find(c =>
              c.body && /EXTERNAL_WITNESS:\s*(SEAL|HOLD|APPROVE)/i.test(c.body)
            );
            if (witnessComment) {
              core.info(`✓ External witness comment from @${witnessComment.user.login}: "${witnessComment.body.split('\n')[0]}"`);
              return;
            }

            // Method 3: PR body contains witness token (last resort)
            if (pr.body && /EXTERNAL_WITNESS:\s*(SEAL|HOLD|APPROVE)/i.test(pr.body)) {
              core.info('✓ External witness token found in PR body');
              return;
            }

            core.setFailed(
              '❌ Gödel Lock: No external witness attestation found.\n' +
              'Required (one of):\n' +
              '  • PR label "external-witness-attested"\n' +
              '  • Comment containing "EXTERNAL_WITNESS: SEAL|HOLD|APPROVE"\n' +
              '  • PR body containing the same token\n' +
              'Witness channels: Gemini · ChatGPT · Claude · Hermes (Arif via Telegram)'
            );

      - name: Audit receipt
        if: success()
        run: |
          echo "## External Witness Attestation"
          echo "- PR: #${{ github.event.pull_request.number }}"
          echo "- Title: ${{ github.event.pull_request.title }}"
          echo "- Author: @${{ github.event.pull_request.user.login }}"
          echo "- Kernel state: ${{ steps.kernel.outputs.kernel }}"
          echo "- Attested: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "- Witness channel: external (PR label or comment)"
          echo ""
          echo "W³ = Human (Arif) × AI (arifOS) × External (this attestation)"
