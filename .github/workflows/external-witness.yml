name: External Witness Attestation (Gödel Lock)

# FORGED 2026-07-15 · HARDENED 2026-07-19. SHA-bound, identity-bound, time-limited.
# The kernel refuses to self-seal. This workflow enforces the W³ External channel
# for any PR that touches protected paths. Attestations are now structured objects — not magic strings.

on:
  pull_request:
    types: [opened, edited, synchronize, labeled]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      pull_request:
        description: 'PR number to attest'
        required: true
        type: number
      head_sha:
        description: 'PR head commit SHA to bind attestation to'
        required: true
        type: string
      risk_class:
        description: 'Risk class (C0_AUTO | C1_STANDARD | C2_PRIVILEGED | C3_SOVEREIGN)'
        required: true
        type: choice
        options: [C0_AUTO, C1_STANDARD, C2_PRIVILEGED, C3_SOVEREIGN]
      verdict:
        description: 'Witness verdict'
        required: true
        type: choice
        options: [SEAL, HOLD, SABAR, VOID]
      scope:
        description: 'Attestation scope'
        required: true
        type: string
        default: 'governance'
      ttl_hours:
        description: 'Attestation TTL in hours'
        required: false
        type: number
        default: 24

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  # ── PR event: validate attestation exists and is SHA-bound ──
  witness:
    name: External Witness Check (W³ channel · SHA-bound)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Declare arifOS kernel identity (no localhost probe — runners are isolated)
        id: kernel
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          | Field | Value |
          |-------|-------|
          | Kernel identity | arifOS constitutional kernel (Ω) |
          | Canonical endpoint | https://arifos.arif-fazil.com/mcp |
          | Gödel lock | ACTIVE — kernel refuses self-seal |
          | Witness requirement | W³ = ∛(Human × AI × External) ≥ 0.75 |
          EOF
          echo "kernel=godel_active" >> "$GITHUB_OUTPUT"

      - name: Validate SHA-bound external witness attestation
        id: attest
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = context.repo;
            const headSha = pr.head.sha;
            const prAuthor = pr.user.login;

            function parseAttestation(body) {
              const m = body && body.match(/```json\s*(\{[\s\S]*?"schema"\s*:\s*"arifos\.witness\.v1"[\s\S]*?\})\s*```/);
              if (!m) return null;
              try { return JSON.parse(m[1]); } catch { return null; }
            }

            function validateAttestation(att, headSha, prNumber) {
              const errors = [];
              if (!att || att.schema !== 'arifos.witness.v1') errors.push('Missing or wrong schema');
              if (att.pull_request !== prNumber) errors.push(`PR mismatch: attestation says #${att.pull_request}, this is #${prNumber}`);
              if (att.head_sha !== headSha) errors.push(`SHA mismatch: attestation bound to ${att.head_sha.slice(0,7)}, head is ${headSha.slice(0,7)}`);
              if (!att.verdict || !['SEAL','HOLD','SABAR','VOID'].includes(att.verdict)) errors.push('Missing or invalid verdict');
              if (!att.witness || !att.witness.id) errors.push('Missing witness identity');
              if (!att.issued_at) errors.push('Missing issued_at timestamp');
              if (!att.signature) errors.push('Missing signature');
              if (att.expires_at) {
                const expiry = new Date(att.expires_at);
                if (expiry < new Date()) errors.push(`Attestation expired at ${att.expires_at}`);
              }
              return errors;
            }

            const hasLabel = pr.labels && pr.labels.some(l => l.name === 'external-witness-attested');

            const comments = await github.rest.issues.listComments({
              owner: repo.owner, repo: repo.repo, issue_number: pr.number,
              per_page: 100
            });

            const validAttestations = [];
            for (const c of comments.data) {
              const att = parseAttestation(c.body);
              if (!att) continue;
              const errors = validateAttestation(att, headSha, pr.number);
              if (errors.length === 0) {
                validAttestations.push({ user: c.user.login, id: c.id, att });
              }
            }

            const externalAttestations = validAttestations.filter(a => a.user !== prAuthor);

            if (hasLabel && externalAttestations.length === 0) {
              core.warning('Label "external-witness-attested" present but no valid non-author attestation found. Label alone is insufficient.');
            }

            if (externalAttestations.length === 0) {
              core.setFailed(
                '❌ Gödel Lock: No valid SHA-bound external witness attestation.\n\n' +
                'The control plane cannot self-attest. ' +
                'REQUIRED: A comment from someone OTHER than the PR author containing a\n' +
                'structured attestation object with:\n' +
                '  • schema: "arifos.witness.v1"\n' +
                '  • pull_request: <this PR number>\n' +
                '  • head_sha: <current head commit SHA>\n' +
                '  • risk_class: C0_AUTO | C1_STANDARD | C2_PRIVILEGED | C3_SOVEREIGN\n' +
                '  • verdict: SEAL | HOLD | SABAR | VOID\n' +
                '  • witness.id: "github:<username>" or organ identity\n' +
                '  • scope: "governance" | "constitutional" | "execution"\n' +
                '  • issued_at: ISO-8601 timestamp\n' +
                '  • expires_at: ISO-8601 timestamp (max 72h from issued_at)\n' +
                '  • signature: Ed25519 or SSH signature\n\n' +
                'Format: wrap the JSON object in a ```json code block.\n' +
                'Label "external-witness-attested" is advisory only — it does not replace attestation.'
              );
              return;
            }

            const best = externalAttestations[0];
            core.info(`✓ Valid SHA-bound attestation from @${best.user} (comment #${best.id})`);
            core.info(`  Verdict: ${best.att.verdict} | Risk: ${best.att.risk_class} | Scope: ${best.att.scope}`);
            core.info(`  Bound to SHA: ${best.att.head_sha.slice(0,12)}`);
            core.setOutput('witness_user', best.user);
            core.setOutput('witness_verdict', best.att.verdict);
            core.setOutput('witness_scope', best.att.scope);

      - name: Audit receipt
        if: success()
        run: |
          echo "## External Witness Attestation (Gödel Lock · SHA-bound)"
          echo "- PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          echo "- Author: @${{ github.event.pull_request.user.login }}"
          echo "- Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "- Witness: @${{ steps.attest.outputs.witness_user }}"
          echo "- Verdict: ${{ steps.attest.outputs.witness_verdict }}"
          echo "- Scope: ${{ steps.attest.outputs.witness_scope }}"
          echo "- Attested: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "W³ witnesses:"
          echo "  Human:  Arif (F13 SOVEREIGN) — via sovereign ack"
          echo "  AI:     arifOS kernel — via arif_judge"
          echo "  External: SHA-bound attestation — identity + timestamp + signature"

  # ── Manual attestation: authorized witness submits SHA-bound attestation ──
  attest:
    name: Submit Witness Attestation
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Validate attestation inputs
        run: |
          ERRORS=""
          [[ "${{ github.event.inputs.head_sha }}" =~ ^[a-f0-9]{40}$ ]] || ERRORS+="head_sha must be a 40-char hex SHA\n"
          [[ "${{ github.event.inputs.pull_request }}" =~ ^[0-9]+$ ]] || ERRORS+="pull_request must be a number\n"
          if [[ -n "$ERRORS" ]]; then
            echo "❌ Input validation failed:"
            echo -e "$ERRORS"
            exit 1
          fi

      - name: Post SHA-bound attestation comment
        uses: actions/github-script@v9
        with:
          script: |
            const repo = context.repo;
            const prNumber = parseInt('${{ github.event.inputs.pull_request }}');
            const headSha = '${{ github.event.inputs.head_sha }}';
            const riskClass = '${{ github.event.inputs.risk_class }}';
            const verdict = '${{ github.event.inputs.verdict }}';
            const scope = '${{ github.event.inputs.scope }}';
            const ttlHours = parseInt('${{ github.event.inputs.ttl_hours }}') || 24;

            const now = new Date();
            const expiry = new Date(now.getTime() + ttlHours * 3600 * 1000);

            const pr = await github.rest.pulls.get({
              owner: repo.owner, repo: repo.repo, pull_number: prNumber
            });

            const actualHeadSha = pr.data.head.sha;
            if (headSha !== actualHeadSha) {
              core.setFailed(`SHA mismatch: provided ${headSha.slice(0,12)}, actual head is ${actualHeadSha.slice(0,12)}`);
              return;
            }

            const witnessId = `github:${context.actor}`;

            const attestation = {
              schema: "arifos.witness.v1",
              pull_request: prNumber,
              head_sha: headSha,
              risk_class: riskClass,
              verdict: verdict,
              witness: {
                id: witnessId,
                role: "external-witness"
              },
              scope: scope,
              issued_at: now.toISOString(),
              expires_at: expiry.toISOString(),
              signature: `github-actions:workflow_dispatch:${context.runId}:${context.actor}`
            };

            const body = [
              '## 🔒 External Witness Attestation (SHA-bound)',
              '',
              '```json',
              JSON.stringify(attestation, null, 2),
              '```',
              '',
              `> Submitted via workflow_dispatch by @${context.actor}`,
              `> Bound to SHA \`${headSha.slice(0,12)}\` · Expires ${expiry.toISOString().slice(0,19)}Z`,
              `> Witness: ${witnessId} · Verdict: ${verdict} · Risk: ${riskClass}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: repo.owner, repo: repo.repo,
              issue_number: prNumber, body
            });

            core.info(`✓ Attestation posted to PR #${prNumber} by ${witnessId}`);
            core.setOutput('attestation_id', `pr-${prNumber}-${headSha.slice(0,7)}`);
