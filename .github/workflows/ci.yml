name: AAA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-gate:
    name: F11 — Secrets Gate
    uses: ariffazil/arifos/.github/workflows/_shared-secrets-gate.yml@main
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Fallback: runs if shared workflow is unavailable (e.g. private repo rate-limit)
  secrets-gate-fallback:
    name: F11 — Secrets Gate (local fallback)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: always() && (needs.secrets-gate.result == 'skipped' || needs.secrets-gate.result == 'failure')
    needs: secrets-gate
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Local secrets scan
        run: |
          FAILED=0
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "sk-[a-zA-Z0-9]{20,}" 2>/dev/null; then
            echo "🚨 Key pattern detected"; FAILED=1
          fi
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | xargs -r grep -lnE "hf_[A-Za-z0-9]{20,}" 2>/dev/null; then
            echo "🚨 HF token detected"; FAILED=1
          fi
          if [ $FAILED -eq 1 ]; then exit 1; fi
          echo "Local scan: CLEAN"

  build:
    name: AAA — Build & Validate
    runs-on: ubuntu-latest
    needs: secrets-gate
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate AAA contracts
        run: npm run validate:aaa

      - name: Build
        run: npm run build
