version: 1
id: hermes-asi-agent
agent_id: hermes-asi
runtime:
  model: mimo-v2.5
  temperature: 0.2
  max_turns: 90
  show_reasoning: true
approval:
  memory_read_tier: T1
  memory_write_tier: T2
  delegate_tier: T2
  vault_write_tier: T2
host_binding:
  type: hermes
  channels:
  - a2a
  - mcp
mcp_surface:
- id: arifos-mcp
  url: https://mcp.arif-fazil.com/mcp
  enabled: true
a2a_peers:
- agent_id: aaa-gateway
  direction: send
  protocol: a2a-v1
- agent_id: hermes-ops
  direction: bidirectional
  protocol: a2a-v1
floors:
- F1
- F2
- F7
- F9
- F13
max_risk_tier: medium
fallback_providers:
- provider: tokenrouter
  model: deepseek/deepseek-v4-pro
- provider: tokenrouter
  model: MiniMax-M3
- provider: tokenrouter
  model: z-ai/glm-5.2
- provider: ollama
  model: qwen2.5-coder:3b
