hexagon:
  version: 4.1.0
  seal:
    seal_id: HEXAGON-4.1-20260717
    verdict: SEAL
    authority: Muhammad Arif bin Fazil — F13 SOVEREIGN
    ratified: '2026-07-17T00:00:00+08:00'
    mutation: >
      4.0.0 was wrong: collapsed roles instead of identities.
      4.1.0 correct: 3 intelligence principals, 2 ASI sealed deeds,
      A-FORGE as bounded service (not intelligence), VAULT999 as archive.
      ASI.REVIEW and ASI.AUDIT share no context.
      Expected-state contract frozen before execution.
  architecture: 3+2+1+1 — 3 minds · 2 deeds · 1 forge · 1 vault · 1 path
  motto: DITEMPA BUKAN DIBERI
  sovereign:
    id: 000-SALAM
    role: Human Sovereign — F13 · above the registry · not an agent
    authority: Muhammad Arif bin Fazil

  doctrine:
    zen: "Collapse the identities, not the functions."
    flow: AGI_PROPOSE → ASI_REVIEW → APEX_JUDGE → AFORGE_EXECUTE → ASI_AUDIT → APEX_RESOLVE → VAULT_RECEIPT
    expected_state_contract: "Frozen before execution. Amendment requires new judgment cycle."
    asi_context_isolation: "ASI.REVIEW and ASI.AUDIT share no working context. Blind audit required."
    anti_theatre_controls: 7  # blind audit, immutable contract, independent evidence, different identity, hard refusal, no rewriting, failure to APEX

  intelligence_principals:
    agi:
      id: 333-AGI
      zen: 🧠 THINK
      duty: "Propose architecture, implementation plan, reversible draft artefacts."
      boundary: "Cannot judge, cannot execute, cannot certify."
      skills: [architecture, implementation-plan, change-proposal, reversible-artifact-draft]
    asi:
      id: 555-ASI
      zen: 🌀 DREAM
      duty: "Review proposals independently. Audit outcomes independently."
      boundary: "Cannot execute, cannot judge. REVIEW and AUDIT share no context."
      deeds:
        review:
          id: ASI.REVIEW
          input: [proposal, requirements, governing_canon]
          blind_to: [future_execution_result, expected_state_contract]
          skills: [preflight-review, adversarial-critique]
        audit:
          id: ASI.AUDIT
          input: [live_state, expected_state_contract, library_refs, execution_receipt]
          blind_to: [ASI.REVIEW_reasoning, AGI_narrative, AFORGE_success_claim]
          refusal_right: BLOCK
          skills: [live-state-audit, drift-detect, health-verify, block-close, certify-evidence]
    apex:
      id: 888-APEX
      zen: ⚖️ JUDGE
      duty: "Constitutional judgment, authority resolution, conflict resolution, rollback/escalation."
      boundary: "Cannot execute, cannot produce domain evidence."
      skills: [constitutional-judge, dispute-resolution, authority-resolution, rollback-decision, escalation]

  bounded_services:
    forge:
      id: A-FORGE
      zen: ⚒️ FORGE
      nature: "Execution machinery. Not an intelligence role. Mutates under SEAL."
      boundary: "Cannot plan, cannot self-authorize, cannot self-judge, cannot self-seal."
      skills: [shell-execution, docker-ops, git-ops, filesystem-mutation, deploy]
    vault:
      id: VAULT999
      zen: 💎 VAULT
      nature: "Immutable receipt archive. Append-only, hash-chained."
      boundary: "Cannot judge, cannot reinterpret."

  agent_cards:
    discoverable: 3
    cards:
      - uri: "aaa://agents/agi"
        agent: 333-AGI
      - uri: "aaa://agents/asi"
        agent: 555-ASI
        deeds: [REVIEW, AUDIT]
      - uri: "aaa://agents/apex"
        agent: 888-APEX
    not_discoverable_as_agents:
      - A-FORGE  # bounded service, not intelligence
      - VAULT999 # bounded service, not intelligence

  escalation:
    stop_the_line:
    - "ASI.REVIEW and ASI.AUDIT executed in same context"
    - "Expected-state contract modified after execution"
    - "A-FORGE self-authorizes or self-certifies"
    - "AGI executes production mutation"
    - "Audit evidence collected from A-FORGE (not directly from live state)"
    - "Failure routed back to ASI.REVIEW instead of APEX"
    ladder:
      drift: ASI.AUDIT blocks → APEX decides
      dispute: ASI.REVIEW flags → APEX judges
      deadlock: APEX cannot resolve → 000-SALAM (F13)
