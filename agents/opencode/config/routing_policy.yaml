# routing_policy.yaml — OpenCode 333-AGI per-agent view
# Source of truth: /root/A-FORGE/src/interfaces/mcp/forgeTools.ts (CLASS_RANK) and
#                   /root/A-FORGE/src/domain/policy/index.ts (Sense, F7, F11)
# This file is the PER-AGENT binding for the OpenCode worker. It does NOT
# redefine the canonical 8-class action taxonomy — that lives in A-FORGE.
# It projects that taxonomy onto the routing decisions the OpenCode agent
# makes at session_init and per tool call.
#
# Doctrine: "CLI moves bits, MCP moves authority."
# Forged: 2026-06-17 by FORGE (000Ω) — Task #3 of routing doctrine table
# Predecessor: forge_work/2026-06-17-routing-policy-forge.md (this file)
# F-floors: F1, F2, F4, F7, F8, F9, F11, F13
#
# DITEMPA BUKAN DIBERI — Codified law, not philosophical mood.

version: 1
schema: arifos.routing_policy/v1
owner: opencode-333-agi
last_updated: 2026-06-17
last_forged_by: FORGE (000Ω)

# ─────────────────────────────────────────────────────────────────────
# 1. ROUTING AXIS (CLI vs MCP)
# ─────────────────────────────────────────────────────────────────────
# CLI default = low entropy, reversible, single-tenant, model already knows it
# MCP required = governance, auth, multi-tenant, structured state, domain reasoning
# 888_HOLD    = irreversible, sovereign, audit-significant
#
# This mirrors the 8-class action taxonomy in A-FORGE
# (forgeTools.ts CLASS_RANK, lines 55-69), but at the routing-decision layer.

routing_axis:
  cli_default:
    description: |
      Shell/POSIX/Git/docker operations executed via bash tool inside
      the OpenCode agent's sandbox. No schema tax. Reversible by default.
      The model already "knows" these from pre-training, so no MCP schema
      loading needed.
    tools:
      - bash                       # OpenCode native shell
      - read / write / edit        # OpenCode native file ops (write w/ explicit ack = F1)
      - ripgrep (via shell)
      - git (via shell)            # local commits OK; remote ops route MCP
      - docker (via shell)         # read-only by default
      - systemctl / journalctl
      - psql / redis-cli (localhost-trust)
    f_floors_active: [F1, F2, F4, F8]
    max_action_class: EXECUTE_REVERSIBLE    # rank 2 in 8-class taxonomy
    audit: stdout-capture (no VAULT write)

  mcp_required:
    description: |
      Structured tools with F1/F8 floor annotations in their descriptions
      (see A-FORGE proxyTools.ts). Cross-trust-boundary, multi-tenant,
      or governance-bearing. Always paid in context tokens for structure.
    servers:
      - id: arifos-kernel
        url: http://127.0.0.1:8088/mcp
        tools_count: 13
        purpose: constitutional primitives (judge, vault, mind, sense)
        max_action_class: EXECUTE_HIGH_IMPACT
        f_floors_active: [F1, F2, F4, F7, F8, F11, F13]
      - id: aforge
        url: http://127.0.0.1:7071/mcp
        tools_count: ~50  # actual — see audit note below
        purpose: governed execution shell
        max_action_class: EXECUTE_HIGH_IMPACT
        note: "Tool surface above 12/server ceiling — audit pending"
      - id: geox
        url: http://127.0.0.1:8081/mcp
        tools_count: 37
        purpose: earth / geological evidence
        max_action_class: EXECUTE_HIGH_IMPACT
        activation: "earth-domain detected"  # load only when needed
      - id: wealth
        url: http://127.0.0.1:18082/mcp
        tools_count: 20
        purpose: capital / financial reasoning (EVIDENCE_ONLY)
        max_action_class: EXECUTE_HIGH_IMPACT
      - id: well
        url: http://127.0.0.1:18083/mcp
        tools_count: 18
        purpose: human substrate / readiness (REFLECT_ONLY)
        max_action_class: EXECUTE_HIGH_IMPACT
      - id: playwright
        url: http://localhost:8931/sse
        purpose: headless browser — when SPA/Next.js defeats curl
        max_action_class: OBSERVE
    f_floors_active: [F1, F2, F4, F7, F8, F11, F13]
    audit: structured events → NATS governance stream

  hold_required:
    description: |
      888_HOLD triggers — actions the agent CANNOT take without explicit
      human approval (Arif = F13 SOVEREIGN). Maps to action_class=IRREVERSIBLE
      (rank 0) in the 8-class taxonomy.
    triggers:
      # ── Vault / sealing ──
      - arif_vault_seal:content="*"
      - forge_approve:holdId present without prior lease
      # ── Capital / WEALTH writes ──
      - wealth_vault_write:tx_type in (BUY, SELL, TRANSFER)
      # ── Git / deploy ──
      - git push --force
      - git rebase
      - branch deletion
      - merge to main
      # ── System / VPS ──
      - systemctl restart a-forge / arifos / geox-mcp / wealth-organ / well
      - Caddy reload
      - Hostinger VPS restart/stop
      - docker volume rm of unknown volume
      - DROP TABLE / DROP DATABASE
      - rm -rf of unknown directory
      # ── Secrets ──
      - secret exposure (any .env read by non-arifos actor)
      - secret rotation
    f_floors_active: [F1, F8, F13]
    audit: VAULT999 SEAL with verdict=SEAL requires human ack_irreversible=true

# ─────────────────────────────────────────────────────────────────────
# 2. TOOL BUDGET (per MCP server, per session)
# ─────────────────────────────────────────────────────────────────────
# Field practice: 5-12 tools per MCP server avoids context bloat.
# A-FORGE actually exposes ~50; GEOX exposes 37. Both exceed ceiling.
# This block is the policy target. The actual pruning is Task #4.

tool_budget:
  target_per_server: 12
  hard_cap_per_server: 18     # exception requires ADR
  max_active_per_session: 30
  domain_cohesion: required
  duplication_check: required  # flag tools that re-wrap POSIX CLI

  # Tool budget audit (live, 2026-06-17)
  audit:
    aforge:
      registered: 50    # 18 forgeTools + 18 gatewayTools + 14 proxyTools + 4 core
      target: 18
      overage: 32
      note: "Documented as Task #4 — partition by domain (forge|proxy|gateway|core)"
    geox:
      registered: 37
      target: 18
      overage: 19
      note: "Partition by capability: read|compute|claim|vision"

# ─────────────────────────────────────────────────────────────────────
# 3. CONTEXT BUDGET (per role, per session)
# ─────────────────────────────────────────────────────────────────────
# Synthesized from current field practice. OpenCode primary budget
# is 64000 (config.yaml line 51). Per-role allocations are projections
# of the multi-agent topology.

context_budget:
  global_window: 128000
  safety_margin_pct: 10        # reserved for output + errors

  # Per-role allocation (if multi-agent topology active)
  roles:
    planner:
      budget_tokens: 24000
      purpose: "task graph + acceptance criteria only"
      handoff_format: "typed context object, <500 tokens"
    executor_cli:
      budget_tokens: 20000
      purpose: "tight local execution"
      shell_allow: [git, ls, cat, rg, fd, jq, curl, docker, systemctl, psql]
      shell_deny: ["rm -rf", "sudo", "mkfs*", "git push --force"]
    executor_mcp:
      budget_tokens: 24000
      purpose: "structured governance ops"
      allowed_servers: [arifos-kernel, aforge, geox, wealth, well, playwright]
    reviewer:
      budget_tokens: 12000
      purpose: "zero-trust validation"
      inputs: [acceptance_criteria, artifact_refs, test_summary, risk_summary]
      deny_inputs: [full_planner_chain, executor_transcript, raw_tool_outputs]

  # Compaction triggers
  compaction:
    auto: true
    prune: true
    reserved_tokens: 10000
    warn_at_pct: 75
    critical_at_pct: 90
    hard_cap_at_pct: 95
    strategy: "summarize-old + drop-low-signal"

# ─────────────────────────────────────────────────────────────────────
# 4. FOUR-GATE PATTERN (for forge_execute-style high-risk operations)
# ─────────────────────────────────────────────────────────────────────
# The A-FORGE proxyTools already annotate F1/F8 in tool descriptions.
# The 4 gates make that explicit at the routing layer.
# This block is the contract for any tool classified as
# EXECUTE_HIGH_IMPACT or IRREVERSIBLE.

four_gate:
  # Gate 1: Scope — is this call allowed at all?
  scope:
    require: policy_allowlist_match
    inputs: [agent_id, environment, tool_name, command_pattern]
    fail_action: DENY + log
  # Gate 2: Intent — what operation class is this?
  intent:
    require: action_class_classified
    classes: [IRREVERSIBLE, EXECUTE_HIGH_IMPACT, EXECUTE_REVERSIBLE, QUEUE, DRAFT, SIMULATE, SUGGEST, OBSERVE]
    source: A-FORGE/src/interfaces/mcp/forgeTools.ts CLASS_RANK
  # Gate 3: Confirmation — do we have approval?
  confirmation:
    require_for: [IRREVERSIBLE, EXECUTE_HIGH_IMPACT]
    method: 888_HOLD or scoped_allow_policy
    storage: "trace_id → approval_record in NATS governance stream"
  # Gate 4: Audit — is every call logged?
  audit:
    require: always
    fields: [trace_id, agent_id, tool, args_hash, action_class, decision, env, ts]
    sink: "VAULT999 append-only + NATS stream"
    fail_action: "block write, never silent"

# ─────────────────────────────────────────────────────────────────────
# 5. HANDOFF SCHEMA (typed context object, not chat blob)
# ─────────────────────────────────────────────────────────────────────
# When the OpenCode agent hands off to another agent (e.g. forge→explore,
# forge→auditor, or AAA warga), the handoff is a typed object, not raw
# conversation. This is the schema.

handoff_schema:
  version: 1
  type: arifos.handoff/v1
  fields:
    - trace_id                # end-to-end propagation
    - task_id
    - goal                    # ≤ 1 sentence
    - constraints             # bounded list
    - inputs                  # references, not blobs
    - required_outputs        # acceptance criteria
    - acceptance_tests        # how reviewer validates
    - artifacts_ref           # external state, not in context
    - budget                  # token budget for receiving agent
    - risk_level              # OBSERVE | LOW | MEDIUM | HIGH | CRITICAL
    - lease_ref               # which arifOS lease is active
    - constitutional_chain_id # which F-floor chain applies
  max_size_tokens: 500
  deny_fields: [full_conversation_history, raw_tool_outputs, large_blobs]

# ─────────────────────────────────────────────────────────────────────
# 6. FAILURE MODES
# ─────────────────────────────────────────────────────────────────────

failure_modes:
  on_mcp_unavailable:
    action: route_to_cli_with_audit
    log: "MCP fallback — degraded mode, may be slower or less safe"
  on_cli_unavailable:
    action: 888_HOLD
    reason: "no execution path without explicit human approval"
  on_unknown_route:
    action: 888_HOLD
    reason: "unknown tool call signature — fail loud, not silent"
  on_schema_drift:
    action: quarantine_and_alert
    reason: "tool description / schema mismatch with registry"
  on_action_class_ambiguous:
    action: classify_as_higher_severity
    rule: "F1 AMANAH — when in doubt, treat as IRREVERSIBLE"

# ─────────────────────────────────────────────────────────────────────
# 7. RESOURCE CAPS (inherited from config.yaml)
# ─────────────────────────────────────────────────────────────────────

resource_caps:
  max_tokens_per_task: 50000         # from config.yaml line 246
  max_api_cost_per_session_usd: 2.00 # from config.yaml line 247
  cache_web_results: true
  kill_idle_processes: true

# ─────────────────────────────────────────────────────────────────────
# 8. EVIDENCE / OBSERVABILITY
# ─────────────────────────────────────────────────────────────────────

observability:
  emit_to_nats: true
  stream: arifos-governance
  metrics:
    - context_tokens_per_call
    - context_composition_by_bucket   # system|history|tools|tool_io
    - handoff_size_tokens
    - handoff_compression_ratio
    - 888_hold_frequency
    - tool_call_count_by_class
    - reviewer_disagreement_rate
  alerts:
    - "context utilization > 90% — trigger compaction"
    - "reviewer received > X tokens of raw history — architecture broken upstream"
    - "duplicate CLI tool detected in MCP manifest"

# ─────────────────────────────────────────────────────────────────────
# 9. BINDING (load this at session_init)
# ─────────────────────────────────────────────────────────────────────

binding:
  load_via: arifos_session_init
  attach_to: opencode-333-agi session
  preconditions:
    - arif_organ_attest_all PASS        # all organs alive
    - arif_lease_issue (scope=opencode, max_action_class=EXECUTE_HIGH_IMPACT)
    - routing_policy.yaml hash recorded in session metadata
  revocation: arif_lease_revoke (F13 SOVEREIGN or policy drift detected)

# ─────────────────────────────────────────────────────────────────────
# END routing_policy.yaml
