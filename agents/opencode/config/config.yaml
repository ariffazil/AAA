id: opencode-333-agi
agent_id: opencode
agent_class: C2
hexagon_stage: 333-THINK

# Runtime configuration
runtime:
  primary_model: deepseek/deepseek-chat        # Default — $0.14/Mtok
  reasoning_model: kimi-for-coding/kimi-k2-thinking  # Complex — $0.40/Mtok
  architect_model: anthropic/claude-sonnet-4-5  # Architecture review only
  vision_model: minimax/MiniMax-M3              # Vision tasks
  temperature: 0
  context_budget: 64000
  transport: streamable-http
  compaction:
    auto: true
    prune: true
    reserved: 10000

# Model routing by task complexity
model_routing:
  trivial: deepseek/deepseek-chat       # Typo fixes, single-line edits
  low: deepseek/deepseek-chat           # Bug fixes, small features
  medium: kimi-for-coding/kimi-k2-thinking  # Refactors, multi-file changes
  high: kimi-for-coding/kimi-k2-thinking    # Architecture, new modules
  critical: anthropic/claude-sonnet-4-5     # Constitutional, deployment, secrets

# Approval tiers
approval:
  default_tier: T1
  edit_tier: T2
  build_tier: T2
  deploy_tier: T3               # 888_HOLD
  destructive_tier: T3          # 888_HOLD
  irreversible_tier: T3         # 888_HOLD
  vault_seal_tier: T3           # 888_HOLD

# Host binding
host_binding:
  type: opencode-cli
  channels: ["terminal"]
  workdir: /root
  spatial_rule: "ON VPS — no SSH, no SCP. All commands local."

# ── FULL MCP SURFACE (18 servers) ──
mcp_servers:
