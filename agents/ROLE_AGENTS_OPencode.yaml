# Forged: 2026-06-14 by FORGE (000Ω)
# Target: /root/.config/opencode/agents/ or OpenCode agent loader
# Purpose: Makes the 4 role agents launchable from OpenCode CLI.
#          Each agent inherits from the AAA configs + bootstrap skill.
#
# Usage: opencode agent run kernel-scribe "scan governance for anomalies"

agents:

  kernel-scribe:
    name: "Kernel Scribe"
    description: "AI internal auditor — reads governance, detects anomalies, proposes policy"
    class: C2
    mode: propose-only
    config: /root/AAA/agents/kernel-scribe
    bootstrap: "python3 -c 'from core.skills.bootstrap import bootstrap_agent_context; print(bootstrap_agent_context(\"kernel-scribe\")[\"bootstrap_command\"])'"
    tools:
      - arifos-kernel_memory_recall
      - arifos-kernel_sense_observe
      - arifos-kernel_threat_score
      - arifos-kernel_autonomy_calibrate
      - arifos-kernel_scenario_policy_eval
      - arifos-kernel_judge_deliberate
      - arifos-kernel_reply_compose
      - arifos-kernel_organ_attest_all
    forbidden:
      - forge_execute
      - arif_vault_seal
      - systemctl restart
    schedule: "On governance event spike OR daily digest"
    model: deepseek-chat
    context_files:
      - /root/AAA/agents/kernel-scribe/SOUL.md
      - /root/AAA/agents/kernel-scribe/AGENTS.md
      - /root/AAA/agents/roles/KERNEL_SCRIBE.md
      - /root/arifOS/core/skills/THREAT_SCORE_SPEC.md

