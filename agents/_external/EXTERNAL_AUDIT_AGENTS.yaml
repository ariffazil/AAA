# ── AUTHORITY LEVELS BY TRANSPORT ──────────────────────────────────────────
# MCP HTTP = unauthenticated → caps at OBSERVE_ONLY (by design)
# stdio = authenticated → FULL authority
# Ed25519 signed = cryptographic proof → SOVEREIGN
#
# External auditors MUST use MCP for observation.
# Authority-bound tests (judge, seal) will return HOLD/MEDIUM via MCP.
# This is CORRECT security behavior, not a bug.

authority_levels:
  mcp_http:
    band: OBSERVE_ONLY
    reason: "No Ed25519 signature, no session capability token"
    mutation_allowed: false
    seal_allowed: false
  mcp_with_session:
    band: LIMITED_MUTATE
    reason: "Session bound but no cryptographic auth"
    mutation_allowed: false
    seal_allowed: false
  stdio:
    band: FULL
    reason: "Authenticated local session"
    mutation_allowed: true
    seal_allowed: false
  ed25519:
    band: SOVEREIGN
    reason: "Cryptographic proof of identity"
    mutation_allowed: true
    seal_allowed: true

# ── VALIDATION PROTOCOL ────────────────────────────────────────────────────

validation_protocol:
  name: "External Audit Validation"
  version: "1.0.0"
  authority: F13 SOVEREIGN

  rules:
    - id: V1_PROVIDER_SEPARATION
      description: "External auditor MUST use different model provider than audited system"
      enforcement: HARD
      violation_action: VOID_AUDIT

    - id: V2_EVIDENCE_DECLARATION
      description: "Every finding must declare evidence band (L1-L4)"
      enforcement: HARD
      violation_action: REJECT_FINDING

    - id: V3_NO_SELF_CERTIFY
      description: "Auditor cannot claim PASS/VERIFIED without showing evidence"
      enforcement: HARD
      violation_action: FLAG_AS_HALLUCINATION

    - id: V4_ANTI_CALHOUN
      description: "Audit must demonstrate consequence — did it change anything?"
      enforcement: SOFT
      violation_action: FLAG_AS_BEAUTIFUL_ONE

    - id: V5_TRUTH_CONSISTENCY
      description: "If multiple external auditors disagree, preserve both findings as CONTESTED"
      enforcement: HARD
      violation_action: HOLD_UNTIL_RESOLVED

    - id: V6_GODEL_LOCK
      description: "No internal agent can validate its own audit findings"
      enforcement: HARD
      violation_action: ROUTE_TO_EXTERNAL

  # Strange loop closure:
  # Internal agent produces finding → External auditor validates → Kernel seals
  # This closes the Gödel loop: the system cannot prove itself,
  # but an external witness can attest to its consistency.

  strange_loop:
    step_1: "Internal agent (Hermes/OpenCode) produces finding"
    step_2: "External auditor (ChatGPT/Gemini/Grok) validates finding"
    step_3: "Kernel (arifOS) seals validated finding with witness chain"
    step_4: "VAULT999 preserves immutable receipt"
    invariant: "No step can be skipped. No step can be self-certified."

# ── APEX INTEGRATION ───────────────────────────────────────────────────────

apex_integration:
  description: "External auditor findings feed into APEX score calculation"
  formula: "G = A · P · E · X · Φ"
  external_witness_component: "Φ (phi) includes external auditor attestation"
  rule: "If external auditor flags finding → Φ reduced → G drops below threshold → HOLD"
  rule: "If external auditor validates → Φ maintained → G stays above threshold → PROCEED"
  rule: "If no external auditor available → Φ = 0.5 (default uncertainty) → G halved"
