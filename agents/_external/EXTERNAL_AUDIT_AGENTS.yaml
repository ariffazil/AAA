      - financial_data_verification
    forbidden:
      - self_certify_pass
      - claim_sealed
      - write_to_audited_system
    evidence_bands: [L2_VERIFIED, L3_CACHED, L4_INFERRED]
    anti_calhoun_gate: true
    validation:
      must_use_different_provider: true
      must_declare_evidence_source: true
    status: ACTIVE

  # Grok — Tertiary external auditor (adversarial)
  grok:
    id: grok-external-auditor
    display_name: "Grok External Auditor"
    provider: xai
    model_constraint: MUST NOT be same provider as audited system
    role: external_auditor
    authority_band: READ_ONLY
