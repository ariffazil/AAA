    forbidden:
      - self_certify_pass
      - claim_sealed
      - write_to_audited_system
      - impersonate_arifos_authority
      - execute_without_lease
    evidence_bands: [L1_SEALED, L2_VERIFIED, L3_CACHED, L4_INFERRED]
    anti_calhoun_gate: true
    skill: arifos-external-council
    validation:
      must_use_different_provider: true
      must_declare_evidence_source: true
      must_demonstrate_consequence: true
      must_not_self_certify: true
