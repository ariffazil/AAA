# ── INVARIANT: External auditor validation rules ──────────────────────────
#
# 1. External auditor MUST use a DIFFERENT model provider than the system being audited
#    - If arifOS runs on Sea-Lion/DeepSeek → auditor must be ChatGPT/Gemini/Grok
#    - If AAA runs on Claude → auditor must NOT be Claude
#    - Rationale: Gödel lock — same model cannot prove its own consistency
#
# 2. External auditor MUST NOT have write access to the system being audited
#    - Read-only observation, challenge, and recommendation
#    - Mutation only through A-FORGE with proper lease + judge path
#
# 3. External auditor MUST declare evidence source
#    - L1 SEALED: immutable receipt from kernel
#    - L2 VERIFIED: live tool result, direct code, test
#    - L3 CACHED: documentation that may be stale
#    - L4 INFERRED: reasoned conclusion without verification
#
# 4. External auditor MUST NOT self-certify
#    - Cannot claim "PASS" without showing evidence
#    - Cannot claim "VERIFIED" without live tool result or code inspection
#    - Cannot claim "SEALED" — only kernel can seal
#
# 5. Anti-Calhoun "beautiful ones" gate
#    - Auditor must demonstrate CONSEQUENCE: did the audit change anything?
#    - If audit produces no actionable finding → flag as "PASSED BUT INCONSEQUENTIAL"
#    - If audit produces finding but no fix → flag as "FINDING WITHOUT CONSEQUENCE"
#    - Prevention: every audit must end with P0/P1/P2 priority fixes or explicit "no action needed"
#
# ── AGENT CARDS ────────────────────────────────────────────────────────────

