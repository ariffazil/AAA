# EXTERNAL AUDIT AGENT CARDS — arifOS Federation
# ═══════════════════════════════════════════════════════════════════════════════
#
# Gödel Lock: No system can prove its own consistency from within.
# Strange Loop: Internal auditors create self-referential validation.
# Solution: External auditors MUST use different model provider than audited system.
#
# Authority: F13 SOVEREIGN (Arif Fazil)
# Doctrine: DITEMPA BUKAN DIBERI
