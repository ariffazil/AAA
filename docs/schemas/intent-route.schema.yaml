# ═══════════════════════════════════════════════════════════════
# Intent Route Contract — v1.0
# How a query becomes a governed action.
# ═══════════════════════════════════════════════════════════════
# Flow: Intent → Classify → Route → Resolve → Verdict → Execute
# Authority: arifOS kernel judges. Organs execute. Arif decides.
# ═══════════════════════════════════════════════════════════════

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "arifos://schemas/intent-route/v1.0"
title: "Intent Route Contract"
description: >
  Maps natural-language intent to domain, organ, tool, and governance verdict.
  Every query enters here. No query bypasses the kernel.

# ─────────────────────────────────────────────────────────────
# THE CONTRACT — what an intent route looks like
# ─────────────────────────────────────────────────────────────

definitions:

  IntentRoute:
    type: object
    required: [intent_id, raw_intent, classification, route, verdict]
    properties:

      # ── IDENTITY ──
      intent_id:
        type: string
        pattern: "^intent:[a-f0-9]{12}$"
        description: "Unique intent trace ID"
      raw_intent:
        type: string
        description: "The original natural-language query"
      timestamp:
        type: string
        format: date-time
      session_id:
        type: string
        description: "arifOS kernel session ID"
      actor_id:
        type: string
        description: "Who issued this intent (human, agent, cron)"

      # ── CLASSIFICATION — what kind of intent ──
      classification:
        type: object
        required: [intent_type, domain, confidence]
        properties:
          intent_type:
            type: string
            enum:
              - observe       # "What is the state of X?"
              - query         # "Tell me about X"
              - analyze       # "Analyze this data"
              - build         # "Create/modify X"
              - deploy        # "Ship X to production"
              - judge         # "Is X allowed/correct?"
              - explore       # "What don't I know about X?"
              - synthesize    # "Combine insights from X and Y"
              - challenge     # "Falsify claim X"
              - seal          # "Permanently record X"
              - meta          # "About the system itself"
          domain:
            type: string
            description: "Primary knowledge domain (from knowledge-graph.schema.yaml)"
            enum:
              - formal
              - physical
              - life
              - human_body
              - social
              - humanities
              - engineered
              - cross_domain
              - meta
          subfield:
            type: string
            description: "Specific subfield if resolvable"
          confidence:
            type: number
            minimum: 0
            maximum: 1
            description: "How confident the classifier is in this routing"
          multi_domain:
            type: boolean
            default: false
            description: "True if intent spans multiple domains"
          domain_chain:
            type: array
            items: { type: string }
            description: "If multi_domain, ordered list of domain IDs"

      # ── ROUTE — where the intent goes ──
      route:
        type: object
        required: [organ, tools]
        properties:
          organ:
            type: string
            enum:
              - arifos       # Constitutional kernel (port 8088)
              - geox         # Earth intelligence (port 8081)
              - wealth       # Capital intelligence (port 18082)
              - well         # Human readiness (port 18083)
              - aforge       # Execution shell (port 7071)
              - aaa          # Control plane (port 3001)
              - hermes       # Explorer router (local)
              - human        # Must be escalated to Arif
              - no_route     # Intent cannot be resolved
            description: "Primary organ that handles this intent"
          secondary_organs:
            type: array
            items: { type: string }
            description: "Organs that may be consulted during execution"
          tools:
            type: array
            items:
              type: object
              properties:
                tool_name: { type: string }
                mcp_server: { type: string }
                purpose: { type: string }
                evidence_class: { type: string, enum: [OBS, DER, INT, SPEC] }
            description: "Specific tools to invoke, in order"
          knowledge_nodes:
            type: array
            items: { type: string }
            description: "Relevant nodes from the knowledge graph"
          explorer_mode:
            type: string
            enum: [none, observe, full_loop]
            default: "none"
            description: "Whether to invoke the explorer protocol"

      # ── VERDICT — what the kernel decides ──
      verdict:
        type: object
        required: [decision]
        properties:
          decision:
            type: string
            enum:
              - SEAL      # Execute immediately
              - SABAR     # Wait — more evidence needed
              - HOLD      # Blocked — constitutional floor violation
              - VOID      # Illegal — cannot be executed ever
          reasoning:
            type: string
            description: "Why this verdict was reached"
          floors_checked:
            type: array
            items:
              type: object
              properties:
                floor: { type: string, enum: [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12, F13] }
                status: { type: string, enum: [pass, warn, fail] }
                detail: { type: string }
          action_tier:
            type: string
            enum: [T1_AUTO_DO, T2_ANNOUNCE, T3_888_HOLD]
            description: "Autonomy tier for this action"
          conditions:
            type: array
            items: { type: string }
            description: "Conditions that must be met before execution"
          cc_id:
            type: string
            description: "Constitutional chain ID if sealed"

      # ── EXECUTION RESULT (filled after execution) ──
      execution:
        type: object
        properties:
          status:
            type: string
            enum: [pending, executing, completed, failed, aborted]
          started_at:
            type: string
            format: date-time
          completed_at:
            type: string
            format: date-time
          artifacts:
            type: array
            items:
              type: object
              properties:
                type: { type: string, enum: [file, commit, deployment, report, chart, receipt] }
                path: { type: string }
                sha256: { type: string }
          receipt:
            type: string
            description: "Structured receipt (WHAT → CHANGED → VERIFIED → CONSEQUENCE → NEXT)"
          seal_id:
            type: string
            description: "VAULT999 seal ID if result was sealed"

# ─────────────────────────────────────────────────────────────
# ROUTE TABLE — canonical keyword → organ mapping
# ─────────────────────────────────────────────────────────────
# This is the REFERENCE mapping. arif_route() uses this.
# Keywords are matched against raw_intent via BM25.
#
# | Keywords                          | Organ     | Domain      |
# |-----------------------------------|-----------|-------------|
# | subsurface, seismic, well, basin  | GEOX      | physical    |
# | npv, irr, capital, portfolio      | WEALTH    | social      |
# | sleep, fatigue, vitality, dignity | WELL      | human_body  |
# | build, deploy, docker, git push   | A-FORGE   | engineered  |
# | cockpit, a2a, agent registry      | AAA       | meta        |
# | law, floor, seal, veto, judge     | arifOS    | meta        |
# | explore, discover, hypothesis     | HERMES    | cross_domain|
# | analyze, compare, synthesize      | HERMES    | cross_domain|
# | human decision, irreversible      | HUMAN     | —           |
# ─────────────────────────────────────────────────────────────
