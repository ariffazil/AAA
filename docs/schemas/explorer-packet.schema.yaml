# ═══════════════════════════════════════════════════════════════
# Explorer Packet — v1.0
# The governed inquiry loop: OBSERVE → HYPOTHESIZE → FALSIFY → VERIFY
# ═══════════════════════════════════════════════════════════════
# Every exploration produces one packet. Packets are immutable once sealed.
# The loop is the scientific method, governed by APEX THEORY.
# ═══════════════════════════════════════════════════════════════

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "arifos://schemas/explorer-packet/v1.0"
title: "Explorer Packet"
description: >
  Structured inquiry loop. One packet per exploration.
  Stages are sequential but may loop back (falsify → re-hypothesize).
  Packet is sealed to VAULT999 when verdict is SEAL or VOID.

definitions:

  ExplorerPacket:
    type: object
    required: [packet_id, origin, stages, verdict]
    properties:

      # ── IDENTITY ──
      packet_id:
        type: string
        pattern: "^explore:[a-f0-9]{12}$"
      origin:
        type: object
        required: [intent_id, actor_id, domain]
        properties:
          intent_id:
            type: string
            description: "Link to IntentRoute that triggered this exploration"
          actor_id:
            type: string
            description: "Who initiated (human, agent, cron)"
          domain:
            type: string
            description: "Primary knowledge domain"
          organ:
            type: string
            description: "Primary organ handling this exploration"
          session_id:
            type: string
      timestamp:
        type: string
        format: date-time
      iteration:
        type: integer
        minimum: 1
        default: 1
        description: "How many times the loop has cycled (falsify → re-hypothesize = iteration 2)"
      max_iterations:
        type: integer
        default: 3
        description: "Cap before escalation to human (prevents infinite loops)"

      # ── STAGE 1: OBSERVE ──
      observe:
        type: object
        required: [status]
        properties:
          status:
            type: string
            enum: [pending, complete, failed]
          question:
            type: string
            description: "What are we trying to understand?"
          data_gathered:
            type: array
            items:
              type: object
              properties:
                source: { type: string, description: "Tool, file, API, observation" }
                content: { type: string, description: "What was found" }
                evidence_class: { type: string, enum: [OBS, DER, INT, SPEC] }
                timestamp: { type: string, format: date-time }
                sha256: { type: string, description: "Content hash for provenance" }
          gaps_identified:
            type: array
            items: { type: string }
            description: "What we expected to find but didn't"
          contradictions:
            type: array
            items:
              type: object
              properties:
                claim_a: { type: string }
                claim_b: { type: string }
                tension: { type: string, description: "Why they contradict" }
          entropy_delta:
            type: number
            description: "ΔS — did observation reduce or increase uncertainty?"
          tools_used:
            type: array
            items: { type: string }

      # ── STAGE 2: HYPOTHESIZE ──
      hypothesize:
        type: object
        required: [status]
        properties:
          status:
            type: string
            enum: [pending, complete, failed]
          hypotheses:
            type: array
            items:
              type: object
              required: [id, statement, confidence]
              properties:
                id:
                  type: string
                  pattern: "^hyp:[a-f0-9]{6}$"
                statement:
                  type: string
                  description: "Falsifiable claim. Must be testable."
                confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                epistemic_class:
                  type: string
                  enum: [OBS, DER, INT, SPEC]
                reasoning:
                  type: string
                  description: "Why this hypothesis is plausible"
                falsification_criteria:
                  type: string
                  description: "What would make this false"
                supporting_evidence:
                  type: array
                  items: { type: string }
                  description: "Evidence IDs from observe stage"
                alternative_hypotheses:
                  type: array
                  items: { type: string }
                  description: "Other explanations for the same data"
                knowledge_graph_refs:
                  type: array
                  items: { type: string }
                  description: "ClaimNode IDs in the knowledge graph"
          selected_hypothesis:
            type: string
            description: "hyp: ID of the hypothesis to test"
          selection_reasoning:
            type: string
            description: "Why this hypothesis was selected over alternatives"

      # ── STAGE 3: FALSIFY ──
      falsify:
        type: object
        required: [status]
        properties:
          status:
            type: string
            enum: [pending, complete, failed]
          tests_run:
            type: array
            items:
              type: object
              required: [test_id, method, result]
              properties:
                test_id:
                  type: string
                  pattern: "^test:[a-f0-9]{6}$"
                method:
                  type: string
                  description: "How the test was conducted"
                tools_used:
                  type: array
                  items: { type: string }
                result:
                  type: string
                  enum: [supports, contradicts, inconclusive, not_applicable]
                evidence:
                  type: string
                  description: "What was observed during the test"
                evidence_class:
                  type: string
                  enum: [OBS, DER, INT, SPEC]
                confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                seal_id:
                  type: string
                  description: "VAULT999 seal if evidence was recorded"
          falsification_summary:
            type: string
            description: "Overall assessment: was the hypothesis falsified?"
          iteration_action:
            type: string
            enum:
              - proceed_to_verify   # Hypothesis survived falsification
              - re_hypothesize      # Falsified — generate new hypothesis
              - escalate_human      # Cannot resolve — need Arif
              - void                # Hypothesis is logically impossible

      # ── STAGE 4: VERIFY ──
      verify:
        type: object
        required: [status]
        properties:
          status:
            type: string
            enum: [pending, complete, failed]
          verification_method:
            type: string
            enum:
              - independent_replication   # Same test, different context
              - cross_domain_check        # Verify against another domain's laws
              - human_review              # Arif or expert validates
              - tool_convergence          # Multiple tools agree
              - historical_consistency    # Matches known patterns
              - external_reference        # Matches published literature
          verification_result:
            type: string
            enum: [confirmed, weakened, contradicted, inconclusive]
          confidence_final:
            type: number
            minimum: 0
            maximum: 1
          epistemic_class_final:
            type: string
            enum: [OBS, DER, INT, SPEC]
          remaining_uncertainty:
            type: string
            description: "What we still don't know"
          knowledge_graph_update:
            type: object
            description: "How the knowledge graph should be updated"
            properties:
              new_claims: { type: array, items: { type: string } }
              updated_claims: { type: array, items: { type: string } }
              new_evidence: { type: array, items: { type: string } }
              new_edges: { type: array, items: { type: string } }

      # ── VERDICT ──
      verdict:
        type: object
        required: [decision]
        properties:
          decision:
            type: string
            enum:
              - SEAL      # Claim verified, record to VAULT999
              - SABAR     # Promising but needs more data
              - HOLD      # Blocked by constitutional floor
              - VOID      # Falsified or impossible
          reasoning:
            type: string
          floors_checked:
            type: array
            items:
              type: object
              properties:
                floor: { type: string }
                status: { type: string, enum: [pass, warn, fail] }
                detail: { type: string }
          g_score:
            type: number
            minimum: 0
            maximum: 1
            description: "APEX G = A·P·E·X·Φ (Nash product)"
          c_dark:
            type: number
            minimum: 0
            maximum: 1
            description: "C_dark = A·(1-P)·(1-X) — BANGANG detector"
          w3_score:
            type: number
            minimum: 0
            maximum: 1
            description: "Tri-witness W³ = ∛(Human × AI × External)"
          cc_id:
            type: string
            description: "Constitutional chain ID if sealed"
          seal_id:
            type: string
            description: "VAULT999 seal ID if verdict is SEAL"

      # ── EVIDENCE LEDGER ──
      evidence_ledger:
        type: object
        description: "All evidence gathered across all stages"
        properties:
          observations:
            type: array
            items:
              type: object
              properties:
                content: { type: string }
                source: { type: string }
                class: { type: string, enum: [OBS, DER, INT, SPEC] }
                stage: { type: string }
          measurements:
            type: array
            items:
              type: object
              properties:
                value: { type: number }
                unit: { type: string }
                uncertainty: { type: number }
                source: { type: string }
          citations:
            type: array
            items:
              type: object
              properties:
                title: { type: string }
                authors: { type: array, items: { type: string } }
                doi: { type: string }
                relevance: { type: string }
          computations:
            type: array
            items:
              type: object
              properties:
                method: { type: string }
                inputs: { type: array, items: { type: string } }
                output: { type: string }
                sha256: { type: string }

      # ── GAPS ──
      gaps:
        type: object
        description: "What was not tested, not found, not resolved"
        properties:
          untested_assumptions:
            type: array
            items: { type: string }
          unresolved_contradictions:
            type: array
            items:
              type: object
              properties:
                claim_a: { type: string }
                claim_b: { type: string }
                resolution_attempted: { type: boolean }
          missing_external_validation:
            type: array
            items: { type: string }
          domain_boundary_unclear:
            type: array
            items: { type: string }
            description: "Where domain-law boundaries are ambiguous"

      # ── APEX COMPLIANCE ──
      apex:
        type: object
        description: "APEX THEORY invariants check"
        properties:
          delta_clarity:
            type: object
            properties:
              evidence_ge_confidence: { type: boolean }
              all_claims_tagged: { type: boolean }
              missing_tests_declared: { type: boolean }
              status: { type: string, enum: [pass, warn, fail] }
          omega_humility:
            type: object
            properties:
              boundaries_declared: { type: boolean }
              uncertainty_cap_respected: { type: boolean }
              unknowns_explicit: { type: boolean }
              status: { type: string, enum: [pass, warn, fail] }
          psi_vitality:
            type: object
            properties:
              state_moved_forward: { type: boolean }
              no_entropy_collapse: { type: boolean }
              human_dignity_preserved: { type: boolean }
              status: { type: string, enum: [pass, warn, fail] }
          overall:
            type: string
            enum: [compliant, partial, violation]

# ─────────────────────────────────────────────────────────────
# LOOP RULES
# ─────────────────────────────────────────────────────────────
# 1. OBSERVE always starts first. No hypothesis without data.
# 2. HYPOTHESIZE must produce ≥1 falsifiable claim.
# 3. FALSIFY must attempt to BREAK the hypothesis, not confirm it.
# 4. VERIFY uses a DIFFERENT method than FALSIFY.
# 5. If falsified → loop back to HYPOTHESIZE (iteration += 1).
# 6. If iteration > max_iterations → ESCALATE TO HUMAN.
# 7. If verified → VERDICT (SEAL/SABAR/HOLD/VOID).
# 8. Every stage updates evidence_ledger.
# 9. Every stage checks APEX invariants.
# 10. SEAL only if G ≥ 0.80 AND C_dark < 0.30 AND W³ present.
# ─────────────────────────────────────────────────────────────
