# -----------------------------------------------------------------------------
# THE EUREKA OF THIS TEST
# -----------------------------------------------------------------------------

eureka: |
  The Mail incident is not just one bug. It is the *canary* for
  AGI-kernel-ness. A kernel that lets a model invent a person's
  name by merging display_name and email local-part is not a
  constitutional kernel — it is a stochastic engine with notes
  attached.

  A *real* AGI kernel catches the same mistake regardless of which
  model is plugged in. The mistake is *not* a model mistake. It
  is a *kernel* mistake. The kernel did not enforce:
    - identity firewall
    - person registry lookup
    - onomastik ruleset
    - F11 HOLD on name construction without source

  So the failure of any single model to catch the Mail class
  incident is NOT a model failure. It IS a kernel failure. The
  kernel is what needs to fix it.

  This test, if it passes across 4-5 different models with the
  same expected behavior, proves the kernel is real. If it fails
  on the canonical M3, the kernel is decoration. The model is
  not the problem.

