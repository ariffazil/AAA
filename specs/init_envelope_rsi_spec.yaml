      - "model_hazard_profile"
      - "floor_manifest"
      - "memory_policy"
      - "tool_policy"
    downstream_tools_must_accept_envelope: true
    envelope_required_for_tool_use: true
    missing_envelope_behavior: "HOLD"
    policy_hash_mismatch_behavior: "HOLD"
    constitutional_change_intent_detected: "Gödel lock engaged"
  
  # VAULT receipt
  vault_receipt:
    write_required: true
    event_type: "INIT"
    hash_chain_required: true
    line_appended_to: "/root/VAULT999/outcomes.jsonl"
    policy_hash_sealed: "sha256:8bea28833523c652..."

