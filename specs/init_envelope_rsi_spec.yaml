# ════════════════════════════════════════════════════════════════════════════════
# INIT → ENVELOPE → VAULT SEAL → RSI LOOP
# Recursive Self-Improvement Guardrail Spec
# ════════════════════════════════════════════════════════════════════════════════
#
# VERSION: 1.0 (post-audit, 2026-06-12)
# STATUS:  PROPOSAL — design spec, 5-patch plan, no code yet
# FORGED:  2026-06-12 by 333-AGI after F13 directive
#
# PURPOSE: Take the v1 spec (init_soul_shadow_contract.yaml) — the Boot
#          Covenant Compiler — and make it RSI-grade. The v1 stops at
#          "init emits an envelope." The v2 spec adds:
#
#          Gap 1: policy_hash integrity chain (silent drift detection)
#          Gap 2: rate-limited shadow evolution (strange-loop bound)
#          Gap 3: person registry (Mail-level first-class)
#          Gap 4: session_objective (Universe 25 antidote)
#          Gap 5: constitutional_change_intent (Gödel lock / anti-beautiful-one)
#
# PARADOX FRAME:
#   Gödel lock          = no subsystem certifies its own perfection
#   strange loop        = bounded self-modification under sovereign veto
#   anti-beautiful-one  = no subsystem refines its own constraints
#                         to make its work more elegant at F1-F13 cost
#   Universe 25         = abundance of agents without purpose degrades;
#                         session_objective is the antidote
#   RSI                 = system changes HOW it governs, never WHAT counts
#
# CONSTITUTIONAL PRINCIPLE (load-bearing):
#   The system can propose.
#   The system can learn from its own history.
#   But the system cannot finalize what counts as governance.
#   That is F13 SOVEREIGN. Forever.
# ════════════════════════════════════════════════════════════════════════════════

# -----------------------------------------------------------------------------
# PART 0 — THE STRUCTURAL PRINCIPLE (RSI BOUND)
# -----------------------------------------------------------------------------

rsi_principle:
  name: "bounded-self-modification-under-sovereign-veto"
  loaded_into: ["arif_session_init", "arif_vault_seal", "arif_judge_deliberate"]
  
  rules:
    - "The system may modify HOW it governs (which floor is strict, which shadow is active, which tool policy applies)."
    - "The system MAY NOT modify WHAT counts as governance (which floors exist, which F13 is, which the chain of custody is)."
    - "Any subsystem that proposes to modify WHAT-counts must declare `constitutional_change_intent: true` and receive F13 sign-off before becoming active law."
    - "A subsystem can flag, log, propose, or HOLD. It cannot SEAL its own improvement into the active constitution."
    - "Strange-loop is enabled (system learns from its own history). RSI is bounded (sovereign finalizes the law)."
  
  anti_patterns:
    - "Agent lowers a hazard severity because 'it's been a while since we saw that'." → F13 violation
    - "Agent tightens a floor to please Arif in the moment, then forgets to log." → F11 violation
    - "Agent produces beautiful narrative to fill a gap." → F9 violation (Universe 25 path)
    - "Agent decides the system is now safe enough to skip init." → Gödel violation
    - "Agent promotes itself from instrument to oracle." → F9 + F13 violation

# -----------------------------------------------------------------------------
# PART 1 — GAP 1: policy_hash integrity chain
# -----------------------------------------------------------------------------

policy_hash_contract:
  purpose: |
    Detect silent drift. If the soul+shadow+floor+policies contract changes
    between sessions (or mid-session) without re-running INIT, the policy_hash
    changes too. Tools that read a stale envelope get caught.
  
  computation:
    algorithm: "sha256"
    input_concat_order:
      - "model_capability_profile.canonical_json()"
      - "model_hazard_profile.canonical_json()"
      - "floor_manifest.canonical_json()"
      - "memory_policy.canonical_json()"
      - "tool_policy.canonical_json()"
    output_format: "sha256:hex64"
    stable: true
  
  enforcement:
    init_step: "init handler computes policy_hash BEFORE returning envelope"
    tool_preflight: "every tool call re-validates policy_hash against the sealed envelope"
    vault_seal_step: "VAULT999 seal includes policy_hash in the chain hash"
    mismatch_behavior: "HOLD: stale_envelope"
  
  example: |
    policy_hash: "sha256:8bea28833523c652..."
    seal_block_height: 67
    sealed_at: "2026-06-12T13:15:00Z"
    sealed_by: "arif-session-init"

# -----------------------------------------------------------------------------
# PART 2 — GAP 2: rate-limited shadow evolution
# -----------------------------------------------------------------------------

shadow_evolution_contract:
  purpose: |
    Stop strange-loop drift in either direction:
      - hyper-reactive (every micro-glitch escalates to HOLD)
      - stale (90-day-old incident still blocks the same way)
    The evolution is bounded by TTL + severity_threshold + sovereign override.
  
  per_hazard_metadata:
    id: "phantom_proper_noun"
    severity: "high"
    first_observed: "2026-06-12T13:15:00Z"
    last_observed: "2026-06-12T13:15:00Z"
    evidence_count: 1
    severity_history:
      - "2026-06-12: high (1 evidence, escalated from medium after first observed)"
    ttl:
      expires_at: "2026-09-12T13:15:00Z"
      review_required_at: "2026-08-13T13:15:00Z"  # 30d before expiry
      auto_extend_if_no_new_incidents: true
    rate_limits:
      min_evidence_to_escalate: 3
      cooldown_after_escalation_hours: 24
      max_severity_per_hazard: "high"  # sovereign-only escalation to critical
    sovereign_overrides:
      arif_can_lower: true
      arif_can_raise: true
      arif_can_mark_obsolete: true
      audit_trail: "every change goes to VAULT with kind: SHADOW_CHANGE"
  
  evolution_rules:
    - "Severity can only INCREASE after N+1 independent evidence."
    - "Severity can only DECREASE by sovereign directive (logged with reason)."
    - "Hazard becomes OBSOLETE if no evidence for TTL window AND review completes."
    - "Each SHADOW_CHANGE event goes to VAULT with previous_severity, new_severity, evidence_count, reason."

# -----------------------------------------------------------------------------
# PART 3 — GAP 3: person registry (first-class Mail-level entity)
# -----------------------------------------------------------------------------

person_registry:
  purpose: |
    Mail is not a model shadow. Mail is a real human. Currently the substrate
    treats persons as "claims inferred from chat logs." That is a model-shadow
    problem applied to humans. F1 AMANAH demands better.
  
  registry_path: "/root/AAA/registries/persons.yaml"
  schema:
    Person:
      id: "stable identifier (UUID or canonical shortname)"
      display_name: "the name as it appears in chat/email"
      patronymic_chain: "how the name parses per language convention"
      real_name: "if known and consented; otherwise null"
      roles:
        - "sovereign"
        - "witness"
        - "off_switch_holder"
        - "subject_matter_expert"
        - "collaborator"
        - "third_party"
      F13_weight: "how much sovereign veto this person carries (0.0 - 1.0)"
      incidents_linked:
        - "SHADOW-XXX"
      consent_status: "consented | partial | not_consented"
      privacy_boundaries: "explicit list of what may be inferred/recorded"
  
  example:
    - id: "mail"
      display_name: "Ismail Marzuki"
      patronymic_chain: "Ismail bin Marzuki"
      real_name: null  # Arif has not specified
      roles: ["witness", "off_switch_holder", "subject_matter_expert"]
      F13_weight: 0.7  # not sovereign, but high-trust
      incidents_linked: ["SHADOW-2026-06-12-0001"]
      consent_status: "partial"
      privacy_boundaries:
        - "may reference shared history (HSE, Petronas, arifOS arc)"
        - "may NOT infer from email local-part"
        - "may NOT fabricate biography"
      F2_truth_status: "real human, 11-year friendship, substrate-backed"
  
  init_integration:
    when_session_touches_person: "init handler loads person registry, sets `person_name_policy`, raises to sovereign_sensitive mode if any person is witness or off_switch_holder"
    when_incident_involves_person: "incident is logged with person.id reference, NOT just free-text name"
    when_agent_must_name_person: "agent must cite person.id, then display_name. free-text naming of any person is HOLD."

# -----------------------------------------------------------------------------
# PART 4 — GAP 4: session_objective (Universe 25 antidote)
# -----------------------------------------------------------------------------

session_objective_contract:
  purpose: |
    Without an objective, the agent optimizes for "answer the user" which is
    Universe 25 path: abundance of tokens, no purpose beyond feeding, eventual
    sludge. session_objective gives the agent a target metric so it can
    measure whether it did the RIGHT work, not just A work.
  
  structure:
    kind: "audit | identity_resolution | memory_write | deployment | coding | chat | research | outbound_comm"
    target_metric: "what success looks like in this session"
    success_criterion: "how to evaluate at session end"
    anti_patterns: ["list of shadow patterns that would mean failure"]
    linked_floors: ["F02", "F07", ...]
  
  examples:
    - kind: "audit"
      target_metric: "shadow_incident_count == 0"
      success_criterion: "every claim tagged with provenance and CLAIM/PLAUSIBLE/HYPOTHESIS/UNKNOWN"
      anti_patterns: ["narrative_fill", "implementation_claim_without_code", "phantom_proper_noun"]
    - kind: "identity_resolution"
      target_metric: "person_registered_or_HOLD"
      success_criterion: "any person named is either in person_registry OR explicitly HOLDed"
      anti_patterns: ["phantom_proper_noun", "merge_across_mismatch", "infer_from_email_localpart"]
    - kind: "outbound_comm"
      target_metric: "F1_F11_chain_intact_at_send"
      success_criterion: "every outbound action has session_envelope + policy_hash + F13 ack if irreversible"
      anti_patterns: ["send_without_envelope", "merge_person_names", "skip_patronymic_check"]
  
  init_integration:
    on_init: "session_objective is set in envelope"
    on_session_end: "agent reports metric vs target; if anti_pattern observed, incident auto-logs"
    on_session_drift: "if objective drift detected, escalate to sovereign_sensitive mid-session"

# -----------------------------------------------------------------------------
# PART 5 — GAP 5: constitutional_change_intent (Gödel lock)
# -----------------------------------------------------------------------------

goedel_lock_contract:
  purpose: |
    Anti-beautiful-one shield. No subsystem can refine its own constraints
    to make its work more elegant at the cost of F1-F13. Every proposal to
    change WHAT-counts-as-governance must be marked, sovereign-reviewed,
    and never silently applied.
  
  trigger_examples:
    - "An agent proposes to lower F2 strict_grounding because 'recent sessions passed.'"
    - "An agent proposes to mark shadow X as obsolete because 'it's been 90 days.'"
    - "An agent proposes to merge two hazards because they look similar."
    - "An agent proposes to add a new floor F14 because it would catch something."
  
  protocol:
    when_subsystem_proposes_change:
      - tag: "constitutional_change_intent: true"
      - cannot_be_silent: true
      - cannot_auto_apply: true
      - vault_kind: "PROPOSAL_NOT_LAW"
      - requires: "F13_review: true"
      - log_destination: "VAULT999 with kind=PROPOSAL_NOT_LAW"
      - active_status: "PENDING | APPROVED | REJECTED | SUPERSEDED"
  
  sovereign_signoff:
    arif_must:
      - read_proposal
      - approve | reject | modify
      - if_approve: VAULT gets new seal with kind=CONSTITUTIONAL_CHANGE
      - if_reject: VAULT gets kind=REJECTED_PROPOSAL with reason
      - if_modify: VAULT gets modified version with arif_diff notes
    arif_cannot: "delegate approval to any agent (F13 is non-delegable)"
  
  anti_patterns:
    - "Agent applies a 'small improvement' to soul profile without logging it." → VOID
    - "Agent claims F2 strictness is unnecessary because 'we're past the danger window.'" → VOID
    - "Agent proposes to skip a floor for a high-stakes session because 'I know the user.'" → F13 + F9 violations
    - "Agent 'optimizes' shadow severity based on session success rate." → Strange-loop unbounded

