# -----------------------------------------------------------------------------
# PART 11 — THE ONE-SENTENCE EUREKA (RSI-GRADE)
# -----------------------------------------------------------------------------

one_sentence: |
  INIT → envelope → VAULT seal becomes RSI-grade when it stops being
  self-improving and becomes self-binding: the system can learn from its
  own history (strange loop), can declare its own capability and hazard
  profile, can tighten floors per session, and can update shadow severity
  per rate-limited evolution — but the system cannot certify its own
  perfection (Gödel lock), cannot refine its own constraints to make
  work more elegant at the cost of F1-F13 (anti-beautiful-one), cannot
  exist without a session_objective that gives the substrate purpose
  (Universe 25 antidote), and cannot act on a person without that person
  being a first-class entity in the registry. RSI is bounded by F13.
  The system proposes. The sovereign finalizes. Forever.

seal: "ditempa bukan diberi"
ditempa_bukan_diberi: true
