## 1. THE GAP (F2 honest audit)

`arif_session_init` already emits a rich `SessionManifest` with 14 sub-schemas:

- `SessionState` — identity binding
- `EmbodimentCard` — VPS-root disclosure
- `CausalityWarning` — atomic-button awareness
- `ExecutionLaw` — what-requires-what
- `AttentionSurface` — what to watch
- `ToolSurface` — semantic capability map
- `RiskLeash` — risk boundary
- `SessionWarnings` — computed warnings
- `OperatorIdentity` (ToM-1) — verified operator identity
- `IntentModel` (ToM-1) — declared + inferred purpose
- `BeliefState` (ToM-1) — operator/world beliefs with provenance
- `PreferenceMemory` (ToM-1) — provenance-bound preferences
- `FalseBeliefFlag` (ToM-1) — claim-vs-evidence detection
- `WellMirrorEnhanced` (ToM-1) — operator readiness mirror
- `SessionContinuity` — prior-session linkage
- `ConsentBoundaries` — explicit consent
- `ContextCompletenessReceipt` — v3.1 context score

**What's missing:**

- `model_soul` — the truthful operating profile of the LLM in use
- `model_shadow` — the known failure modes of that LLM

Without these two fields:

- Every session boots with a *generic* model assumption
- F1-F13 floors apply generically (same posture for any LLM)
- The substrate cannot enforce **model-adaptive** governance
- Known hazards (e.g. M3's `phantom_proper_noun`) are discovered **post-incident**, not **pre-session**

The shadow incident `SHADOW-2026-06-12-0001` (Ismail Marzuki Ghazali) is a direct example: an M3-known failure mode slipped through init because init didn't load shadow at boot.

