## 2. THE PROPOSAL — TWO NEW FIELDS

Add to `SessionManifest`:

```python
class ModelSoulCard(BaseModel):
    """Truthful operating profile of the LLM bound to this session."""

    provider: str                           # e.g. "minimax"
    family: str                            # e.g. "MiniMax-M3"
    version: str                           # e.g. "MiniMax-M3"
    verified: bool = False
    verified_at: str | None = None         # ISO timestamp
    cooling_ledger_ref: str | None = None  # path to cooling ledger

    archetype: str | None = None           # e.g. "frontier_agentic_longcontext_moe"
    trust_posture: str = "instrument_not_oracle"

    strengths: list[str] = Field(default_factory=list)
    weak_domains: list[str] = Field(default_factory=list)

    ideal_use: list[str] = Field(default_factory=list)
    not_for_ground_truth: list[str] = Field(default_factory=list)


class ModelShadowCard(BaseModel):
    """Known failure modes of the LLM bound to this session."""

    known_patterns: list[str] = Field(default_factory=list)
    incident_refs: list[str] = Field(default_factory=list)
    severity: str = "low"                  # low | medium | medium_high | high
    mitigation_defaults: list[str] = Field(default_factory=list)


# Add to SessionManifest:
model_soul: ModelSoulCard | None = None
model_shadow: ModelShadowCard | None = None
```

