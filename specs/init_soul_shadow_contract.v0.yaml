## 8. WHY THIS IS *NOT* A FULL REWRITE

- `SessionManifest` is already 17 sub-schemas deep
- Adding 2 fields to it is **additive, not breaking**
- `arif_session_init`'s existing logic for identity binding, embodiment disclosure, risk leash, ToM-1 scaffold is **preserved**
- The new fields sit alongside `model_identity`-like data, which is already partially there (`declared_model_key` on input)

This is a **2-file patch** in `arifOS`:
1. `arifosmcp/schemas/session.py` — add `ModelSoulCard`, `ModelShadowCard`, `FloorPosture`. Add 2 fields to `SessionManifest`. Add 3 fields to init request.
2. `arifosmcp/runtime/tools.py` — wire the new fields in `arif_session_init` handler. Read from `model_soul.yaml` registry.

Plus 1 file in `AAA`:
1. `/root/AAA/registries/model_soul.yaml` (already forged) — add `floor_posture_examples` per model.

