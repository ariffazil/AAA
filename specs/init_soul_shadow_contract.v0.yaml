## 5. IMPLEMENTATION PSEUDOCODE

```python
async def arif_session_init(req: InitRequest) -> SessionManifest:
    manifest = SessionManifest(...)
    # ... existing init flow ...

    # NEW: load soul+shadow
    if req.declared_model_key:
        soul = load_model_soul_from_registry(req.declared_model_key)
        shadow = load_model_shadow_from_registry(req.declared_model_key)
        if (req.require_soul_profile and not soul) or \
           (req.require_shadow_profile and not shadow):
            if req.fail_closed_on_missing_registry:
                manifest.status = "HOLD"
                manifest.warnings.identity_unverified = True
                manifest.warnings.model_identity_unverified = True
                return manifest

        manifest.model_soul = soul
        manifest.model_shadow = shadow

        # Derive per-session floor posture
        manifest.floor_posture = derive_floor_posture(
            soul=soul,
            shadow=shadow,
            active_incidents=get_recent_incidents(req.declared_model_key),
            patronymic_mode=req.patronymic_mode,
        )

    return manifest
```

