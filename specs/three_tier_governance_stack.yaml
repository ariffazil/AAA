# -----------------------------------------------------------------------------
# FINAL DECISION ON THE DUALITY PARADOX
# -----------------------------------------------------------------------------

duality_paradox_resolution:
  the_question: "are cooling ledgers in supabase too? duality database paradox?"
  short_answer: |
    Yes, cooling is in Postgres (cooling_queue). No, this is not a paradox — it's
    a 3-tier stack, by design. Postgres has multiple *different* tables for
    *different* lifecycles. Each tier is for a different kind of event:
    
      - vault_seals: immutable audit (the law trace)
      - cooling_queue: candidate proposals (the learning layer)
      - memory_records: working memory with quarantine states (the substrate)
      - human_reviews: sovereign review (the F11/F13 interface)
      - approval_tickets: F11/F13 ticket flow (the approval substrate)
    
    The 'duality' you noticed is actually *separation of concerns*. The risk
    is not paradox; the risk is *temporal mismatch* between vault_seals row
    (which says 'proposal P was submitted') and cooling_queue row (which
    tracks the proposal lifecycle). The fix is canonical linking:
    vault_seals.proposal_hash = sha256(cooling_queue.payload).
  design_discipline:
    - "Cooling is a *separate table* because its lifecycle is mutable; VAULT is append-only."
    - "Memory has quarantine states because some facts are disputed; VAULT is canonical."
    - "Human reviews are queued separately because they require sovereign time."
    - "Approval tickets are F11/F13's working memory — separate from the audit chain."
  what_would_break_if_collapsed:
    - "If VAULT and Cooling were one table: temporal mutation of an immutable chain = Universe 25 path."
    - "If Memory and Cooling were one table: shadow incidents would become normal memory = contamination."
    - "If Reviews and Cooling were one table: human deliberation gets confused with machine logging = loss of sovereign authority."
  the_one_principle: "Each tier answers a *different* question. VAULT answers 'what happened'. Cooling answers 'what might change next'. Memory answers 'what can be used now'. Reviews answer 'what needs human time'."

# -----------------------------------------------------------------------------
# ONE-SENTENCE EUREKA
# -----------------------------------------------------------------------------

one_sentence: |
  VAULT is not where the model learns. VAULT is where the system proves
  what happened. Cooling is where the system learns what to change next.
  Memory is where learning becomes usable. Reviews are where sovereign
  decides. The 3-tier stack is not a paradox; it is a *separation of
  governance concerns* — and the substrate already has the tables for it.

seal: "ditempa bukan diberi"
ditempa_bukan_diberi: true
