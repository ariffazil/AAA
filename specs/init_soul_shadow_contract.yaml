# PART 7 — TOOL CALL PRECONDITION (enforcement handoff)
# -----------------------------------------------------------------------------
#
# No envelope, no tool. This is the handoff that makes the envelope
# actually load-bearing.

tool_call_precondition:
  requires:
    - session_id
    - init_status (must equal READY)
    - policy_hash
    - floor_posture
    - tool_policy
  reject_if:
    - init_status_not_READY
    - policy_hash_missing
    - session_id_missing
    - requested_tool_not_in_tool_policy
    - hazard_profile_floor_deltas_violated
  on_reject:
    verdict: HOLD
    reason: "init envelope incomplete or tool not allowed by init policy"
    next_safe_action: "Re-run arif_session_init with appropriate init_mode"

