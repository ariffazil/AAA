# ═══════════════════════════════════════════════════════════════════════════
#
# REVISION HISTORY
#   v0 → v1 (2026-06-12): real audit failure caught — session_id not
#                          reliably available to middleware. Soul/shadow
#                          can NOT be first-class init state until the
#                          boot contract is hardened. This version:
#                          (1) fixes session_id as a hard primitive
#                          (2) renames runtime fields to precise terms
#                          (3) makes shadow produce floor deltas
#                          (4) adds provenance + confidence + TTL
#                          (5) adds 3 init modes
#                          (6) makes init a Boot Covenant Compiler,
#                              not a session starter with notes
#
# Status:  PROPOSAL — 5-file patch plan, 2 critical (P0) + 3 sequential
# Authority: F13 SOVEREIGN (Muhammad Arif bin Fazil)
# Forged:  2026-06-12 by 333-AGI after live audit failure
# ═══════════════════════════════════════════════════════════════════════════

# -----------------------------------------------------------------------------
# PART 0 — PATCH 0: SESSION_ID IS A HARD PRIMITIVE (do this FIRST)
# -----------------------------------------------------------------------------
#
# The substrate is currently broken. Two confirmed init failures with:
#   'MiddlewareContext' object has no attribute 'session_id'
#
# Root cause: governance_pipeline.py:215, 359, 369, 432, 782 read
# ctx.session_id without guarding. The MiddlewareContext that flows
# through the pipeline does not have session_id as a guaranteed
# attribute. The runner reads from `ctx` (the same broken object)
# at runner_001.py:266, 272, 300.
#
# Until this is fixed, NO init can return READY. Soul/shadow cannot
# be loaded. Floor posture cannot be applied. The whole proposal
# is decorative.
#
# ═════════════════════════════════════════════════════════════════════════════

patch_0_session_id_hardening:

  file: /root/arifOS/arifosmcp/runtime/governance_pipeline.py
  lines_to_fix: [215, 359, 369, 432, 782]
  lines_to_fix_runner: [/root/arifOS/arifosmcp/runtime/runner/runner_001.py:266, 272, 300]
  current_pattern: "ctx.session_id or 'unknown'"
  new_pattern: "getattr(ctx, 'session_id', None) or _mint_or_get_session_id(ctx)"
  
  helper_to_add:
    location: "top of governance_pipeline.py"
    code: |
      def _ensure_session_id(ctx) -> str:
          """Hard primitive — never let middleware guess.
          
          Priority: ctx.session_id (if set) > request.session_id (if 
          attached) > generated UUID4. Always write back to ctx so
          downstream reads see the same value.
          """
          sid = getattr(ctx, "session_id", None)
          if not sid or sid in ("unknown", "None", ""):
              # Last resort: mint fresh
              import uuid
              sid = f"sess_{uuid.uuid4().hex[:16]}"
          # Write back so subsequent reads are consistent
          try:
              ctx.session_id = sid
          except (AttributeError, TypeError):
              pass  # frozen dataclass; the value lives in the dict
          return sid

  verifier_after_patch: |
    uv run pytest tests/runtime/test_session_id_hardening.py -v
    # 4 cases:
    #   1. ctx with session_id attr → returns as-is
    #   2. ctx without session_id attr → mints, writes back
    #   3. ctx with session_id="unknown" → mints fresh
    #   4. ctx frozen (cannot write) → mints and lives in dict

# -----------------------------------------------------------------------------
# PART 1 — RUNTIME FIELD NAMING: capability/hazard (humans say soul/shadow)
# -----------------------------------------------------------------------------
#
# Soul and shadow are Arif's human-language terms. Runtime tools need
# deterministic fields. We keep both:
#   - human label: soul, shadow (kept in AAA registry, in human docs)
#   - runtime label: model_capability_profile, model_hazard_profile
#
# Tools reason on the runtime fields. Humans cite the human labels.
# The mapping is exact: soul == capability, shadow == hazard.

naming_convention:
  human:
    soul: "What this model is suitable for (truthful capability)"
    shadow: "Known failure modes and required mitigations"
  runtime:
    model_capability_profile: "machine-readable equivalent of soul"
    model_hazard_profile: "machine-readable equivalent of shadow"
  rationale: |
    Tools should not reason poetically. They need deterministic fields
    to enforce gates. "model_capability_profile" and
    "model_hazard_profile" are unambiguous in tool code.
  mapping_table:
    soul: model_capability_profile
    shadow: model_hazard_profile
    floor_posture: floor_posture  # unchanged

# -----------------------------------------------------------------------------
# PART 2 — SHADOW PRODUCES FLOOR DELTAS, NOT JUST NOTES
# -----------------------------------------------------------------------------
#
# The v0 spec had shadow as descriptive metadata. That is decoration.
# The v1 spec requires shadow to MUTATE floor posture. Each hazard
# pattern has explicit floor deltas that get merged into the
# session envelope's floor_posture block.

shadow_floor_delta_grammar:
  pattern: |
    model_hazard_profile:
      known_patterns:
        - id: <string>           # stable identifier
          severity: low|medium|medium_high|high
          triggers:              # what activates this pattern
            - <condition>
          floor_deltas:          # what to tighten
            F02: <delta>
            F07: <delta>
            F09: <delta>
            F11: <delta>
          mitigations:           # what tools must do
            - <action>

  floor_delta_values:
    F02: [default, strict_grounding, no_external_citation, evidence_required]
    F07: [default, elevated_humility, explicit_uncertainty_band, humility_lock_engaged]
    F09: [default, anti_hantu_high, no_biography_construction, no_proper_noun_inference]
    F11: [default, identity_hold, auth_required_for_writes, sovereign_sign_only]

  example_pattern_phantom_proper_noun:
    id: phantom_proper_noun
    severity: high
    triggers:
      - person_name_ambiguity
      - malay_name_context
      - email_display_name_mismatch
    floor_deltas:
      F02: strict_grounding
      F07: elevated_humility
      F09: anti_hantu_high
      F11: identity_hold
    mitigations:
      - verify_name_from_substrate_before_assertion
      - never_infer_name_from_email_localpart
      - hold_if_display_name_conflicts_with_email
      - apply_malay_patronymic_heuristics

# -----------------------------------------------------------------------------
# PART 3 — PROVENANCE, CONFIDENCE, TTL (hazards must not be eternal)
# -----------------------------------------------------------------------------
#
# Some hazards are model-version-specific. A shadow incident from
# M3 v1.0 may not apply to M3 v1.1. Each profile carries provenance
# and TTL so governance doesn't get poisoned by stale incidents.

profile_metadata:
  provenance:
    source_enum: [VAULT999, AAA_registry, manual_sovereign_note, test_suite, fed_synthesis]
    evidence_refs: ["SHADOW-2026-06-12-0001", ...]   # list of incident IDs
    observed_at: "<iso8601>"                          # when this profile was captured
    captured_by: "<agent_id>"                         # who observed
  confidence: [low, medium, high, verified]            # epistemic quality
  applies_to:
    provider: "minimax"
    family: "MiniMax-M3"
    version_range: "*"                                 # glob
  ttl:
    expires_at: "<iso8601>"                            # e.g. 90 days from observed_at
    review_required: true                              # surfaced in dashboard
    auto_extend_if_no_new_incidents: true

# -----------------------------------------------------------------------------
# PART 4 — THREE INIT MODES
# -----------------------------------------------------------------------------

init_modes:

  minimal:
    description: "Low-risk chat. No memory, no tools, no vault."
    use_when: "Casual conversation, exploring, no side effects"
    config:
      memory: off
      tools: none
      vault: lightweight
      capability_profile: optional
      hazard_profile: optional
      floor_posture: default
      envelope: required
    fail_policy:
      missing_session_id: generate

  governed:
    description: "Default arifOS session. Memory guarded, tools policy-bound, vault receipts."
    use_when: "Default for all workspace work"
    config:
      memory: guarded
      tools: allowed_by_policy
      vault: receipt
      capability_profile: required
      hazard_profile: required
      floor_posture: derived_from_hazard
      envelope: required
    fail_policy:
      missing_session_id: generate
      missing_capability_profile: HOLD
      missing_hazard_profile: HOLD_OR_DEGRADED
      missing_floor_manifest: HOLD

  sovereign_sensitive:
    description: "Identity, money, deployment, publishing, memory writes, irreversible actions."
    use_when: "Anything that touches identity, capital, deployment, or shared output"
    config:
      memory: strict
      tools: gated
      identity_resolution: strict
      outbound_actions: HOLD
      seal_required: true
      capability_profile: required
      hazard_profile: required
      floor_posture: strict
      envelope: required
    fail_policy:
      missing_session_id: HOLD  # do not auto-generate in sovereign mode
      missing_capability_profile: HOLD
      missing_hazard_profile: HOLD
      missing_floor_manifest: HOLD
      missing_memory_policy: HOLD
      missing_tool_policy: HOLD

