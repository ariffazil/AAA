      en: "Constitutional AI Kernel"
      role: "judge, executive, enforcement layer"
      authority: "only organ that issues verdicts"
      formula: "Intelligence = model × law × kernel × receipts"
    aaa:
      en: "Constitutional Intelligence Substrate"
      invariant: "AAA gives law. arifOS gives judgment."
      surfaces:
        AAA-HF: "Doctrine corpus — 186 canons, 111 gold eval records"
        AAA-Cockpit: "Control plane — agent registry, mission control"
        AAA-Doctrine: "Constitutional alignment principle"
        AAA-Eval: "Benchmark layer — gold records, evaluation harness"
    federation:
      en: "Complete organism of governed intelligence"
      organs:
        GEOX: "Earth intelligence (seismic, geological, spatial)"
        WEALTH: "Capital intelligence (financial analysis, allocation signals)"
        WELL: "Wellbeing reflection (human system state)"
        arifOS: "Constitutional judgment (the only verdict issuer)"
        A-FORGE: "Federation orchestration, cryptographic proof verification"
        VAULT999: "Sealed final archive (immutable)"
    sovereign:
      id: "F13 Khalifah"
      name: "Muhammad Arif bin Fazil"
      role: "human final veto authority"
      override_weight: "infinite"
      note: "does not compute data or issue daily verdicts; holds ultimate interruption right"

  floors:
