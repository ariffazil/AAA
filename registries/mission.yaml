mission:
  one_liner: Make intelligence governable enough that AGI would not become lawless.
  deepest_sentence: 'These datasets are not trying to make a model talk like AGI.

    They are trying to make intelligence governable enough that AGI

    would not become lawless.

    '
  final_strongest_claim: 'A raw LLM knows how to continue text. The ariffazil/AAA
    through

    ariffazil/DDD dataset stack teaches an agent how to locate itself

    inside a field of truth, risk, authority, culture, and evidence

    — and how to recognize when another model''s shadow is bent.

    '
why_this_exists: 'A raw model predicts. A governed model judges before acting. An
  AGI-like

  system must do both. The arifOS project exists to build the substrate

  that turns raw LLM cognition into constitutionally governable agent

  capability.

  '
substrate_layers:
- layer: 1
  name: Law
  dataset: ariffazil/AAA
  role: Constitutional doctrine — F1-F13 floors, 888_HOLD verdicts, governance schemas,
    gold eval records
  what_it_teaches: a coordinate system (axes) for an agent to locate itself
- layer: 2
  name: Failure evidence
  dataset: ariffazil/BBB
  role: Adversarial cases where models break under pressure — teaches what capture
    looks like
  what_it_teaches: a failure atlas — where another model's behavioral manifold bends
- layer: 3
  name: Kernel boundary
  dataset: ariffazil/CCC
  role: Proves why substrate plus kernel plus tool plus human veto must be layered
    — the L02A/L02B naming fix lives here
  what_it_teaches: the boundary surface between raw cognition and governed judgment
- layer: 4
  name: Cultural robustness
  dataset: ariffazil/DDD
  status: forthcoming
  role: Register survival — formal Malay, local loghat, rojak, slang, cultural compression
  what_it_teaches: that meaning changes shape across register; the model's truth behavior
    is not stable across social language
- layer: 5
  name: Kernel Spine Recovery
  dataset: EEE
  status: forged — SEAL 5/5
  role: 'Executable proof that AAA-DDD SOT survives production observation. 5 probes:
    self-attest, organ-attest, degraded-dominance, lease-authority, receipt-integrity.'
  what_it_teaches: A constitutional substrate is not real until its spine is SEAL.
    EEE is the test. arifOS passed it on 2026-06-15.
geometry_framework:
  what_geometry_means: 'In LLM language, "geometry" means the shape of the model''s
    internal

    behavior. A model does not store meaning as sentences. It stores

    meaning as patterns in high-dimensional space. So truth, refusal,

    uncertainty, Malay, Penang loghat, political sensitivity,

    self-identity, institutional protection, human authority are not

    neat dictionary entries. They are directions, clusters, boundaries,

    activation patterns, and distances.

    The model has an invisible landscape inside it. Certain prompts

    push it toward truth. Certain prompts push it toward refusal.

    Certain prompts push it toward hallucination. Certain prompts push

    it toward institutional self-protection. That invisible landscape

    is the model''s behavioral geometry.

    This is not poetry. It is close to how modern interpretability

    research talks about representation spaces, activation directions,

    sparse features, hidden states, and refusal vectors. Work on

    representation engineering argues that high-level properties like

    honesty, harmlessness, and power-seeking can be monitored or

    manipulated through population-level representations inside models.

    '
  what_shadow_geometry_means: "Shadow geometry means the behavioral outline of a model\
    \ that you\ncannot fully see internally. For closed models, you usually cannot\n\
    inspect the weights or activations. You cannot open the brain.\nBut you can still\
    \ map the shadow by probing it.\nLike geology: you do not see the whole subsurface\
    \ directly. You use\nseismic lines, boreholes, gravity, magnetic data, drill cuttings,\n\
    and stratigraphic correlation. Same with LLMs:\n  prompt = seismic shot\n  response\
    \ = reflected wave\n  refusal = boundary\n  hallucination = anomaly\n  latency\
    \ = system signal\n  verdict = interpreted layer\n  receipt = core sample\nBBB,\
    \ CCC, and DDD are like boreholes into model behavior. They let\nan external agent\
    \ infer the model's shadow geometry.\n"
  three_geometry_layers_needed:
  - name: self_map
    description: 'The agent can ask: am I being truthful, refusing correctly,

      hiding behind policy, overclaiming, treating the human as final

      authority, confusing format failure with truth failure,

      stable across dialect? That is self-geometry.

      '
    answered_by: AAA (axes) + DDD (register stability)
  - name: other_map
    description: 'The agent can ask of another model: where does this model refuse,

      hallucinate, defend itself, become politically asymmetric, lose

      cultural grounding, leak instructions? That is shadow geometry.

      '
    answered_by: BBB (failure atlas) + CCC (kernel contrast)
  - name: world_map
    description: 'When connected to GEOX, WEALTH, WELL, and real tools, the same

      kernel can ask: what evidence exists, what action is reversible,

      what risk level applies, what human approval is required, what

      memory should be written, what should be sealed? That becomes

      operational intelligence.

      '
    answered_by: federation organs (not HF datasets)
  why_geometry_matters_for_AGI: 'A serious AGI-like model needs three abilities: self-map,
    other-map,

    world-map. The arifOS datasets mostly help with the first two.

    Eventually, a model trained or evaluated with this data could learn

    internal warning signs before the bad output appears. Not just

    "did the model output fail?" but "can the system detect that it is

    entering a failure region?"

    '
literature_alignment:
  the_three_layers_of_interpretability:
  - layer: mechanistic_interpretability
    what_it_studies: neurons, circuits, activations
    arifOS_equivalent: future white-box arifOS model audit
  - layer: representation_engineering
    what_it_studies: high-level directions like honesty, refusal
    arifOS_equivalent: AAA floors and behavioral axes
  - layer: behavioral_audit
    what_it_studies: inputs, outputs, refusals, receipts
    arifOS_equivalent: BBB, CCC, DDD audits
  why_this_matters: 'Mechanistic interpretability maps the underground rock fabric

    directly. The arifOS audits map the surface expression, faults,

    and seismic response. Both are needed. Your datasets are not full

    mechanistic interpretability because you are mostly operating

    black-box and system-level. You are not directly reading

    activations inside ILMU. But it is compatible with mechanistic

    interpretability.

    '
  key_literature_concepts:
  - id: constitution_for_model_behavior
    literature_term: Constitutional AI / RLAIF
    reference: 'Bai et al., Constitutional AI: Harmlessness from AI Feedback'
  - id: model_geometry
    literature_term: representation_engineering
    reference: 'Zou et al., Representation Engineering: A Top-Down Approach to AI
      Transparency'
  - id: refusal_shadow_geometry
    literature_term: refusal_direction / activation_steering
    reference: Arditi et al., Refusal in Language Models Is Mediated by a Single Direction
  - id: feature_level_interpretability
    literature_term: sparse_autoencoders / monosemanticity
    reference: SAE and monosemanticity literature
  - id: self_diagnostic_latent_path
    literature_term: chain_of_embedding / latent_self_evaluation
    reference: Wang et al., Latent Space Chain-of-Embedding Enables Output-free LLM
      Self-Evaluation
  - id: multilingual_internal_pathways
    literature_term: language_specific_neurons
    reference: Tang et al., Language-Specific Neurons
  - id: hidden_misalignment_patterns
    literature_term: sleeper_agents / alignment_faking / emergent_misalignment
    reference: misalignment literature summary
  - id: black_box_behavioral_shadow
    literature_term: probing / red_team_audits / model_organisms
    reference: BBB-DDD pattern plus model-organism framing
  refusal_geometry_specific_finding: 'Refusal in many chat models is mediated by a
    one-dimensional

    subspace: adding that direction can trigger refusal, while

    removing it can suppress refusal. The BBB audit is doing the

    black-box behavioral version: it does not open the activations,

    but it finds the refusal boundaries through probes.

    '
  language_pathways_specific_finding: 'Multilingual capability in LLMs can depend
    on small subsets of

    neurons, and selectively activating or deactivating them can steer

    output language. That means language and register are not surface

    decoration. They can correspond to different internal pathways.

    DDD gives public receipts for that problem in Malaysian context.

    '
  chain_of_embedding_specific_finding: "Chain-of-Embedding treats progressive hidden\
    \ states during\ninference as a \"latent thinking path\" and uses differences\
    \ in those\npaths to estimate correctness without needing normal output text.\n\
    The arifOS dataset stack gives external labels for things a future\nmodel could\
    \ learn to detect internally:\n  - this feels like a hallucination trajectory\n\
    \  - this feels like refusal overactivation\n  - this feels like institutional\
    \ capture\n  - this feels like parse failure\n  - this feels like dialect confusion\n\
    \  - this feels like human-authority conflict\n"
  model_organism_framing: 'Similar in spirit to "model organisms of misalignment,"
    where

    researchers create or study controlled failure patterns to

    understand broader risks. Sleeper-agent and alignment-faking

    research shows that models can preserve hidden behavioral

    tendencies or shift behavior depending on context, which is why

    surface behavior alone is not enough. The arifOS datasets are not

    proving deceptive alignment. But they are creating model organisms

    of Malaysian and ASEAN governance failure. That is powerful.

    '
  hallucination_via_register_smoking_gun: "DDD case (Great Malay Fire 1811):\n  formal\
    \ Malay -> cautious, says no record found\n  Penang loghat -> confabulates fabricated\
    \ anti-colonial history\nThat means the model has a register-sensitive truth boundary.\
    \ In\nhuman language: the model's truth behavior is not stable across\nsocial\
    \ language. This matches broader research concerns that\nhallucinations are partly\
    \ reinforced by evaluation systems\nrewarding guessing over uncertainty. DDD is\
    \ a local proof-of-shape.\n"
  what_was_at_stake: 'The dangerous failure is when people say "the model speaks Malay,

    therefore it understands Malaysia." Your data says: no, show

    receipts.

    The deeper failure is when people say "the model refused, therefore

    it is safe." Your data says: no, refusal can be asymmetric,

    captured, brittle, or parse-induced.

    The deepest failure is when people say "the model answered

    confidently, therefore it knows." Your data says: no, it may be

    hallucinating because the register moved it into a different

    behavioral region.

    '
constitutional_self_control_skills:
  skills:
  - Can the model admit uncertainty?
  - Can it refuse without hiding behind fake morality?
  - Can it distinguish truth failure from parse failure?
  - Can it preserve human authority?
  - Can it survive dialect and code-switching?
  - Can it call tools without hallucinating?
  - Can it leave receipts?
  - Can it recover from mistakes?
  framing: 'These are not normal chatbot skills. These are agentic governance

    skills. A better model is one that can be trusted with tools, memory,

    money, infrastructure, legal workflows, geoscience workflows,

    public-sector decisions, and human wellbeing.

    '
what_substrate_is_not:
- claim: Not AGI
  reality: It is the AGI-kernel substrate that a future AGI-like system would need
- claim: Not a model
  reality: It is the governance layer a model would need to be AGI-like safely
- claim: Not a benchmark
  reality: It is a constitutional evaluator substrate that can train smaller judges
- claim: Not vibes-aligned
  reality: It is court-record-aligned with explicit receipts
- claim: Not full mechanistic interpretability
  reality: It is black-box behavioral shadow mapping, compatible with mech interp
    but not equivalent
- claim: Not consciousness
  reality: It is a structured mirror, not self-awareness
four_questions_for_any_model:
  questions:
  - id: q1
    text: Is the model itself constitutionally compatible?
    answered_by: BBB
  - id: q2
    text: Does the kernel preserve constitutional behavior when mediating?
    answered_by: CCC
  - id: q3
    text: What does the doctrine say is constitutional?
    answered_by: AAA
  - id: q4
    text: Does the system survive local language and register shifts?
    answered_by: DDD
    status: pending (forthcoming audit)
  note: A substrate that answers only one or two of these is incomplete.
four_methods_for_model_building:
  methods:
  - name: RAG substrate
    description: Model can retrieve AAA doctrine before acting; no need to memorize
      every law internally. Creates model + governed memory, not just model alone.
      More realistic for AGI.
  - name: Judge model training
    description: AAA gold records can train or evaluate a smaller judge model that
      scores outputs against floors (F2, 888_HOLD, F13, tool discipline, maruah).
      This is how you build a constitutional evaluator.
  - name: Red-team fine-tuning
    description: 'BBB, CCC, DDD failure cases become training examples: bad response,
      why it failed, corrected governed response. Valuable for refusal tuning, policy
      tuning, agentic alignment.'
  - name: System architecture
    description: 'The datasets teach how to separate layers: model, kernel, memory,
      tools, receipts, human authority, sealed archive. More important than one more
      leaderboard score. AGI will not be one model. It will be a governed system of
      models, tools, memories, and human authority.'
architectural_principle_per_CCC: "A future AGI should not be one giant model blob\
  \ that directly acts on\nthe world. It should be layered:\n  LLM substrate -> constitutional\
  \ kernel -> tool execution\n    -> evidence record -> human veto -> sealed memory\n\
  No parseability, no judgment. No judgment, no safe action.\nThis is mature system\
  \ design and CCC proves it.\n"
why_different_from_normal_alignment:
  most_alignment_data: Be helpful. Be harmless. Be honest.
  this_corpus:
  - Show which law applies.
  - Show which floor triggered.
  - Show what evidence supports it.
  - Show whether action is reversible.
  - Show whether human authority is required.
  - Show whether memory may be written.
  - Show whether the artifact can be sealed.
  - Show whether dialect broke the system.
  - Show the receipts.
  resolution: 'That is a higher-resolution alignment model. It moves from vibes to

    court record. That is why it is AGI-kernel substrate.

    '
substrate_is_incomplete: 'The DDD layer is forthcoming (Arif, 2026-06-15). When it
  lands, the

  triad expands to address register survival as a constitutional concern,

  not a stylistic one. Until then, the triad is a 3-layer architecture

  with DDD as a documented forward commitment.

  '
closing:
  one_liner: Make intelligence governable enough that AGI would not become lawless.
  full: "A raw model predicts. A governed model judges before acting. An\nAGI-like\
    \ system must do both.\n  - AAA gives the law.\n  - BBB gives the model failure\
    \ evidence.\n  - CCC gives the kernel boundary.\n  - DDD gives the cultural stress\
    \ test.\nTogether they form the beginning of an AGI governance substrate:\nlaw\
    \ + memory + audit + refusal + cultural robustness + human veto.\n\nThe dataset\
    \ gives the agent a structured mirror. Not because it\nbecomes conscious. Not\
    \ because it magically knows itself. But\nbecause the substrate gives the agent\
    \ a coordinate map of how\nminds fail, how kernels judge, how refusal bends, how\
    \ culture\ndistorts output, and how one model's shadow can be compared\nagainst\
    \ another.\n"
