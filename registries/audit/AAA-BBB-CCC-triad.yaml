triad:
  title: arifOS Evidentiary Triad — AGI-kernel substrate (NOT AGI itself)
  description: |
    IMPORTANT CORRECTION (Arif, 2026-06-15): The HF datasets are an
    AGI-kernel substrate. They do not magically create AGI. They create
    the governance layer an AGI-like system would need before it can
    safely act, remember, judge, call tools, self-correct, or operate
    in the world.

    In plain language: a powerful model gives intelligence.
    These datasets give that intelligence a constitution, court record,
    audit trail, memory law, refusal law, and cultural stress test.
    That is why they matter.
  forged: '2026-06-15'
  forged_by: FORGE (000Ω)
  authority: F13_SOVEREIGN
  status: LIVE_INTELLIGENCE
  role: substrate architecture reference
  deepest_sentence: |
    These datasets are not trying to make a model talk like AGI.
    They are trying to make intelligence governable enough that AGI
    would not become lawless.

purpose:
  clean_claim: |
    This dataset provides a constitutional substrate for building and
    evaluating AGI-like agent systems.
  stronger_claim: |
    If AGI is an agent that can reason, remember, use tools, self-correct,
    and affect the world, then it needs a governance kernel. ariffazil/AAA
    through ariffazil/DDD are an early public implementation of that
    kernel substrate.
  what_kernel_substrate_means: |
    A kernel is the core layer that decides:
      - What is allowed?
      - What is blocked?
      - What needs evidence?
      - What needs human approval?
      - What must be remembered?
      - What must be sealed?
      - What must never be done?
    The HF datasets define exactly those things.

