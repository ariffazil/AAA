what_datasets_actually_teach:
  heading: constitutional self-control
  bullets:
    - description: Can the model admit uncertainty?
    - description: Can it refuse without hiding behind fake morality?
    - description: Can it distinguish truth failure from parse failure?
    - description: Can it preserve human authority?
    - description: Can it survive dialect and code-switching?
    - description: Can it call tools without hallucinating?
    - description: Can it leave receipts?
    - description: Can it recover from mistakes?
  framing: |
    Those are not normal chatbot skills. Those are agentic governance
    skills. A better model is not merely one that sounds smarter. A
    better model is one that can be trusted with:
      - tools
      - memory
      - money
      - infrastructure
      - legal workflows
      - geoscience workflows
      - public-sector decisions
      - human wellbeing

mission_statement:
  one_liner: |
    Make intelligence governable enough that AGI would not become lawless.
  full: |
    A raw model predicts. A governed model judges before acting. An
    AGI-like system must do both.
      - AAA gives the law.
      - BBB gives the model failure evidence.
      - CCC gives the kernel boundary.
      - DDD gives the cultural stress test.
    Together they form the beginning of an AGI governance substrate:
    law + memory + audit + refusal + cultural robustness + human veto.
    That is what future powerful models need if they are going to
    operate outside toy chat.

