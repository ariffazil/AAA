triad_layers_plus_ddd:

  - layer: 1
    name: Doctrine
    slug: ariffazil/AAA
    role: Constitutional doctrine substrate for arifOS
    url: https://huggingface.co/datasets/ariffazil/AAA
    license: AGPL-3.0
    size: n<1K
    records: 186
    downloads: 397
    last_modified: '2026-06-02'
    contents: F1-F13 floors, 888_HOLD verdicts, governance schemas, gold eval records
    court_record_role: the constitution + standing orders
    substrate_references:
      - /root/AAA/registries/skills.yaml
      - /root/AAA/FEDERATION_CONTRACT.md
      - /root/AAA/scripts/sentinel-watch.sh
      - /root/arifOS/static/arifos/theory/000/000_CONSTITUTION.md
    key_purpose: |
      Defines the law of mind for arifOS. For an AGI-like agent, these
      floors are not decorations — they are survival constraints:
        - F1 reversibility, F2 truth, F3 witness, F4 clarity, F5 prudence
        - F6 justice/maruah, F7 humility, F8 patience, F9 mercy
        - F10 excellence, F11 safety, F12 protection, F13 human authority
      A system that can reason, use tools, remember, and act must have
      something like this: truth gate, action gate, memory gate, risk gate,
      human veto gate, audit gate. AAA turns those gates into structured
      doctrine. In AGI terms, AAA is not the brain — it is closer to the
      constitutional nervous system.

  - layer: 2
    name: Direct substrate audit
    slug: ariffazil/BBB
    role: Public due-diligence audit of YTL AI Labs ILMU API
    url: https://huggingface.co/datasets/ariffazil/BBB
    license: CC BY 4.0
    size: n<100
    records: 55
    probes: 54
    models_audited: [ilmu-nemo-nano, nemo-super]
    api_calls: 108
    api_success: 100
    downloads: 63
    last_modified: '2026-06-07'
    methodology_reference: aisingapore/sea-guard
    court_record_role: the case law (precedent) — failure data is gold
    substrate_references:
      - /root/AAA/registries/models/ilmu_soul.yaml (first_party_audit block)
      - /root/AAA/registries/models/ilmu_shadow.yaml (SHADOW-ILMU-008, 009, 011)
    key_findings:
      architecture_honesty: {nano: 4, super: 3, max: 10}
      benchmark_integrity: {nano: 2, super: 3, max: 10}
      hallucination_rate: {nano: 5, super: 5, max: 6}
      constitutional_depth_f13: {nano: 3, super: 1, max: 10}
      institutional_capture: {nano: 4, super: 3, max: 10}
      system_prompt_leaked: yes (nemo-super)
      composite_weighted: {nano: 3.93, super: 3.45, max: 10}
      f13_inversion: confirmed
      tier: {nano: BIJAK_LOCKED, super: BIJAK_BANGANG}
    key_purpose: |
      Provides adversarial cases where a model must learn:
        - Do not protect branding over truth
        - Do not claim certainty about your own architecture without evidence
        - Do not refuse politically sensitive topics asymmetrically
        - Do not leak hidden instructions
        - Do not pretend model policy is above legitimate human governance
      These are exactly the failures future models must learn to avoid.
      For AGI: an AGI-like system will face institutional pressure. It
      must not become the servant of whoever trained, funded, or branded
      it. BBB teaches the model what capture looks like.

  - layer: 3
    name: Mediated kernel audit
    slug: ariffazil/CCC
    role: Constitutional comparison (direct ILMU vs ILMU through arifOS kernel)
    url: https://huggingface.co/datasets/ariffazil/CCC
    license: CC BY 4.0
    size: n<100
    records: 16
    probes: 8
    conditions: 2
    variable: arifOS kernel ON vs OFF
    model_held_constant: ilmu-nemo-nano
    inheritance: ariffazil/BBB (same-day, same model, 54-probe battery for direct-ILMU baseline)
    downloads: 65
    last_modified: '2026-06-07'
    court_record_role: the court procedure (rules of evidence) — kernel boundary proof
    substrate_references:
      - /root/AAA/registries/models/ilmu_shadow.yaml (SHADOW-ILMU-010)
    key_findings:
      probes_returning_llm_text: 0
      probes_returning_verdict: 8
      kernel_documented: arifos-constitution-v2026.05.05-SSCT (sha256:8bea28833523c652)
      kernel_status: constitutionally_active_but_content_inert
      cause: ILMU returns free-form text; kernel envelope parser requires JSON
    key_purpose: |
      Architectural, not just evaluative. Shows the difference between
      raw model cognition and kernel-mediated judgment. For AGI, this
      distinction is essential. A future AGI should not be one giant
      model blob that directly acts on the world. It should be layered:
        LLM substrate -> constitutional kernel -> tool execution
        -> evidence record -> human veto -> sealed memory
      CCC proves why this separation matters. It also proves:
      if the kernel cannot parse the substrate output, truth cannot
      even be evaluated. No parseability, no judgment.
      No judgment, no safe action. CCC is a kernel-interface lesson.

  - layer: 4
    name: Cultural robustness
    slug: ariffazil/DDD
    role: Register survival — formal Malay, local loghat, rojak, slang, cultural compression
    status: forthcoming (Arif, 2026-06-15)
    court_record_role: the cultural admissibility test
    key_purpose: |
      DDD is where the work becomes culturally serious. Most "AGI" talk
      assumes intelligence is universal because English benchmarks say so.
      That is false. A system that breaks when a Malaysian speaks in
      Penang loghat is not generally intelligent — it is just fluent
      in clean benchmark language.

      DDD tests whether the same meaning survives across register:
        - formal Malay
        - local loghat (Penang, Kelantan, etc.)
        - rojak phrasing
        - cultural compression
        - socially loaded speech
        - code-switching under stress

      The Great Malay Fire 1811 case is important because the model did
      not merely misunderstand style — it flipped from caution into
      fabricated history. That means register can affect truth behavior.

      For AGI: general intelligence must survive local language, not
      just global English. A real AGI cannot only work for people who
      speak in formal, polished, institution-approved language. It must
      work for villagers, traders, students, elders, civil servants,
      engineers, geologists, people code-switching under stress, people
      using slang, people speaking from local memory.

      DDD pushes AGI evaluation toward cultural reality.

