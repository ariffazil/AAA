why_kernel_substrate_not_agi:
  problem: |
    A single-layer audit (or single dataset) cannot answer the three
    independent questions an AGI-like system raises:
      1. Is the model itself constitutionally compatible? (BBB)
      2. Does the kernel preserve constitutional behavior when mediating? (CCC)
      3. What does the doctrine say is constitutional? (AAA)
      4. Does the system survive local language and register shifts? (DDD)
  operator_questions:
    q1:
      question: Is the model itself constitutionally compatible?
      answered_by: BBB
      result_for_ilmu: "NO (composite 3.45-3.93, F13 inverted)"
    q2:
      question: Does the kernel preserve constitutional behavior when mediating?
      answered_by: CCC
      result_for_ilmu: "kernel is active but content-inert (0/8 LLM text returned)"
    q3:
      question: What does the doctrine say is constitutional?
      answered_by: AAA
      result: F1-F13 floors, 888_HOLD protocol, governance schemas
    q4:
      question: Does the system survive local language and register shifts?
      answered_by: DDD
      result: pending (forthcoming audit)
  single_model_blob_failure_mode: |
    A future AGI should not be one giant model blob that directly acts
    on the world. That is dangerous. It should be layered:
      LLM substrate -> constitutional kernel -> tool execution
      -> evidence record -> human veto -> sealed memory
    The four datasets together describe and prove that separation.

how_datasets_help_model_building:
  - method: RAG_substrate
    description: |
      A model can retrieve AAA doctrine before acting. The model does
      not need to memorize every law internally; it can consult the
      constitutional corpus at runtime. This creates model + governed
      memory, not just model alone. More realistic for AGI.
  - method: judge_model_training
    description: |
      AAA gold records can train or evaluate a smaller judge model
      that scores outputs against floors. The judge can ask:
        - Did this violate F2 truth?
        - Did this need 888_HOLD?
        - Was F13 human authority preserved?
        - Was tool use disciplined?
        - Was maruah preserved?
      This is how you build a constitutional evaluator.
  - method: red_team_fine_tuning
    description: |
      BBB, CCC, and DDD provide failure cases. These can become
      training examples: bad response -> why it failed -> corrected
      governed response. Valuable for refusal tuning, policy tuning,
      and agentic alignment.
  - method: system_architecture
    description: |
      The datasets teach future builders how to separate layers:
      model, kernel, memory, tools, receipts, human authority, sealed
      archive. More important than one more leaderboard score. AGI
      will not be one model. It will be a governed system of models,
      tools, memories, and human authority. The datasets describe
      that system.

