geometry_framing: |
  Per /root/AAA/registries/mission.yaml geometry_framework, the triad
  is a coordinate system, not just a doctrine:

    AAA provides axes (F1-F13 floors as evaluative coordinates)
    BBB provides a failure atlas (where another model's manifold bends)
    CCC provides a boundary surface (raw cognition vs governed judgment)
    DDD provides register stability (whether meaning survives dialect)

  Self-map: agent asks where it is on the F1-F13 axes
  Other-map: agent asks where another model's shadow bends
  World-map: agent connected to GEOX/WEALTH/WELL + tools

  Compatible with mechanistic interpretability but not equivalent.
  Black-box behavioral shadow mapping, not white-box activation reading.

  Strongest sentence: A raw LLM knows how to continue text. The
  arifOS dataset stack teaches an agent how to locate itself inside
  a field of truth, risk, authority, culture, and evidence -- and how
  to recognize when another model's shadow is bent.
