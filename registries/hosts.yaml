  - openclaw/acp
  contract_path: contracts/hosts/contracts.yaml
  install_method: acp-session-template
  supported_protocols:
  - mcp
  - a2a
  permission_profiles:
  - id: default
    default: true
    approval_policy: on-demand
- id: geox-acp
  name: GEOX ACP
  version: '1'
  runtime_type: acp
  transport: stdio
  config_paths:
