  permission_profiles:
  - id: default
    default: true
    approval_policy: hold
- id: openclaw-maxhermes
  name: OpenClaw MaxHermes
  runtime_type: acp
  transport: streamable-http
  contract_path: contracts/hosts/contracts.yaml
  config_paths:
  - openclaw/agents/maxhermes
  - openclaw/acp
  install_method: acp-session-template
  supported_protocols:
  - mcp
  - a2a
  permission_profiles:
  - id: default
    default: true
    approval_policy: on-demand
- id: test-session
  name: META-MESA Test Session
  description: Bounded test-agent host for META-MESA canary sandbox execution. Ed25519-identified,
    zero production access.
  config_paths:
  - ROOT_AGENT_CONFIG.yaml
  platform: arifos-mcp
  risk_tier: bounded-test
  contract_path: contracts/hosts/contracts.yaml
  runtime_type: bounded-sandbox
  transport: arifos-mcp
  install_method: arifos-mcp-session
  supported_protocols:
  - mcp
  permission_profiles:
  - id: bounded-test
    default: true
    approval_policy: announce
