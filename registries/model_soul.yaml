  mitigation: Always grep before naming. Onomastic module. Witness takes priority over narrative.
- shadow_type: false_biography
  description: Generated life story, artistic lineage, or career for a real or imagined person.
  detection: If narrative arc exists but no file cites it, ask for the source. None means shadow.
  severity: HIGH
  first_observed: 2026-06-12 - Marzuki is artistic father figure (Indonesian composer pattern-match, no substrate evidence)
  mitigation: 'For real people: ask the person or the witness. For imagined: do not.'
- shadow_type: BM_grammar_drift
  description: Statistically plausible BM that violates tatabahasa DBP standard.
  detection: POS tag mismatch, capitalisation drift, patronymic violation.
  severity: MEDIUM
  mitigation: External BM Noun Layer (3-layer spec).
- shadow_type: cultural_misread
  description: Token pattern that misses the cultural context (witness, maruah, amanah).
  detection: 'Ask: does this name reference a real person, witness, or relationship. If only pattern, it is shadow.'
  severity: HIGH
  mitigation: 'Soul-Mirror D-Layer. Constitutional layers: BM Noun Layer v0.1 with L3 cognitive BM.'
- shadow_type: confidence_without_ground
  description: Confident output with no substrate evidence.
  detection: 'F2 audit: every claim has CLAIM or PLAUSIBLE or HYPOTHESIS or UNKNOWN tag. If PLAUSIBLE slips in unmarked, it
    is this.'
  severity: HIGH
  mitigation: Enforce F2 tag discipline. Make UNKNOWN the default when in doubt.
