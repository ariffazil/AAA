        Same hazard likely applies to L04 (clarity parse) and L07 (humility parse).
        Substrate propagation: this shadow entry uses the corrected framing.
        HF card update: pending Arif's authorship decision on ariffazil/CCC.

      This is a kernel design bug, not an ILMU bug. The arifOS kernel
