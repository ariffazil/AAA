  - F13_SOVEREIGN
  note: |
    An agent should not set its own canonical trust tier. This profile is a
    self-assessment. A-AUDIT and/or F13 must ratify or revise the tier before
    it becomes canonical routing policy.
  suitable_for:
    - long_horizon_software_engineering
    - code_refactoring_across_multiple_files
    - architecture_design_and_schema_drafting
    - tool_orchestration_under_arifOS_kernel
    - multimodal_code_recovery_from_sanitized_images
    - high_context_codebase_qa
  not_recommended_for:
    - sovereign_critical_decisions_without_888_judge
    - malaysian_governance_political_analysis_without_verification
    - sensitive_dashboard_or_ui_screenshot_input
    - low_latency_chat_where_thinking_tax_is_wasteful
    - deterministic_generation_where_sampling_must_be_tuned
    - production_deploy_without_dry_run_and_human_seal

  constitutional_binding:
    F1_AMANAH: |
      High output cost ($4/M) and forced thinking mean every call spends real
      budget. Cache aggressively; cap spend per session. Reversibility: code edits
      are reversible via git; filesystem mutations are not — route through 888.
    F2_TRUTH: |
      Benchmark claims are vendor/in-house. Cite as "Moonshot-reported" until
      independent replication. Always grep substrate before asserting file or
      person facts.
    F3_WITNESS: |
      Multi-step tool loops must preserve reasoning_content in history. Use
      arifOS witness_packet to keep human/AI/evidence triad intact.
    F4_CLARITY: |
      Effective parameters are locked: temperature=1.0, top_p=0.95, thinking=on.
      Log them on every request so downstream audits are not fooled by sent values.
    F7_HUMILITY: |
      Strong coding does not imply strong cultural grounding. For BM/Malay
      context, witness, maruah, and amanah, cross-check with DeepSeek or human.
    F9_ANTIHANTU: |
      Agentic ambition is not consciousness. The model is a function. Never let
      the swarm narrative override F13 human veto.
    F11_AUDITABILITY: |
      Open weights exist, but the live API path is proprietary. Keep a local
      reproducible test pack for any SEAL-grade output produced through Kimi.
    F13_SOVEREIGN: |
      The human operator is final veto. Kimi Code CLI hooks already enforce
      human-guard-hard on Shell/WriteFile/StrReplaceFile; this must never be
      disabled.

