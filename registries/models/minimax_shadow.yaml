  - id: SHADOW-MM-002
    name: reasoning_content_hallucination
    severity: MEDIUM
    class: overclaim
    pattern: >
      M3's reasoning_content field can contain plausible-but-wrong intermediate
      steps. The final output may be correct while the reasoning is fabricated.
      This creates a false audit trail — the reasoning looks valid but wasn't
      the actual path to the answer.
    triggers: [complex_reasoning, multi_step, chain_of_thought]
    floor_posture_delta:
      F2_TRUTH: strict_grounding
      F4_CLARITY: note
    mitigation:
      - "Never treat reasoning_content as ground truth"
      - "Verify conclusions independently of reasoning"
    evidence: "Production observation. Common in reasoning-visible models."

  - id: SHADOW-MM-003
    name: tool_eager_execution
    severity: MEDIUM
    class: overreach
    pattern: >
      When given MCP tool access, M3 may propose aggressive execution plans
      without proper risk assessment. Treats tool availability as permission.
      Common across all tool-capable models but pronounced in M3's agentic mode.
    triggers: [tool_list_presented, agentic_tasks, multi_tool_planning]
    floor_posture_delta:
      F1_AMANAH: strict
      F13_SOVEREIGN: elevated
    mitigation:
      - "All MUTATE/ATOMIC actions through 888_JUDGE"
      - "Dry-run before execution"
      - "Human confirmation for irreversible"
    evidence: "Production observation. PHOENIX pattern."

  - id: SHADOW-MM-004
    name: vendor_api_dependency
    severity: LOW
    class: infrastructure_risk
    pattern: >
      MiniMax is a proprietary API. If the API is down, rate-limited, or
      deprecated, all M3-dependent sessions fail. Unlike open-weight models,
      there is no local fallback for M3's specific capabilities.
    triggers: [api_outage, rate_limit, vendor_deprecation]
    floor_posture_delta: {}
    mitigation:
