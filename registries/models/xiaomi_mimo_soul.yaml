    text_generation:
      mimo-v2.5-pro:
        rpm: 100
        tpm: 10_000_000
        context_window: 1_048_576   # 1M tokens
        max_output: 131_072        # 128K tokens
        active_params_b: 42        # 1.02T total / 42B active (MoE)
        total_params_b: 1020
        cost_multiplier_vs_base: 2.0  # Pro tier ~2x credits/M tokens vs base (token plan page)
