        tpm: 10_000_000
        context_window: 1_048_576   # 1M tokens
        max_output: 131_072        # 128K tokens
      mimo-v2.5:
        rpm: 100
        tpm: 10_000_000
        context_window: 1_048_576   # 1M tokens
        max_output: 131_072        # 128K tokens
        cost_multiplier_vs_base: 1.0  # base tier
      mimo-v2-omni:  # legacy
        rpm: 100
        tpm: 10_000_000
        context_window: 262_144     # 256K tokens — NOT 1M! Migrating to V2.5 silently upgrades context
        max_output: 131_072        # 128K tokens
      mimo-v2-flash:  # legacy, auto-routes to V2.5 from 2026-06-18
        rpm: 100
        tpm: 10_000_000
        context_window: 262_144     # 256K tokens
        max_output: 65_536         # 64K tokens — half of omni. Migrating to V2.5 silently doubles max output
    asr:
      mimo-v2.5-asr:
        rpm: 100
        tpm: 10_000   # NB: ASR TPM is 10K, not 10M
        context_window_asr_space: 8192   # 8K ASR-tokens (audio frames, not text)
        max_output_asr_space: 2048       # 2K ASR-tokens
        token_model: audio_frames        # ASR TPM is in audio-frame tokens, not text tokens
    tts:
      mimo-v2.5-tts:
        rpm: 100
        tpm: 10_000_000
      mimo-v2.5-tts-voiceclone:
        rpm: 100
        tpm: 10_000_000
      mimo-v2.5-tts-voicedesign:
        rpm: 100
        tpm: 10_000_000
      mimo-v2-tts:  # legacy
        rpm: 100
        tpm: 10_000_000
    rate_limit_principles: |
      RPM = max requests/minute summed across all API Keys under one account for the same model.
      TPM = max tokens/minute summed across all API Keys under one account for the same model.
      The platform sets a per-account model concurrency limit. Under high load, expect
      429 errors — implement exponential backoff and retry, do not hammer.
    migration_side_effects: |
      When a legacy ID auto-routes to V2.5 (post 2026-06-18), the request inherits
      the V2.5 backing model's capabilities. This means SILENT capability upgrades:
        - mimo-v2-omni (256K ctx) -> mimo-v2.5 (1M ctx):  4x context window upgrade
        - mimo-v2-flash (64K out) -> mimo-v2.5 (128K out): 2x max output upgrade
      For most workloads this is good. For cost-pinned workloads that benchmarked
      against the smaller window, the upgrade may invalidate prior assumptions.
      See SHADOW-MIMO-008.
    no_extra_context_charge:
      claim: |
        Per Xiaomi MiMo V2.5 token plan page (2026-06-11), using the full 1M
        context window no longer carries an extra credit multiplier — V2.5
        base = 1x credit, V2.5-Pro = 2x credit, and 1M context is included.
      significance: |
        The Flash -> V2.5-omni auto-reroute is therefore a NET POSITIVE on
        capability AND cost efficiency, not just a context upgrade at a
        modest price jump. For long-output, long-context workloads, this
        is the strongest case for the migration.
      epistemic: CLAIM (token plan page) — cross-confirmed by third-party MiMo API providers echoing V2.5 base ~ 0.14/0.28 USD per 1M tokens with no context-length surcharge.

