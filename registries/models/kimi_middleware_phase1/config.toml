default_model = "kimi-code/kimi-for-coding"
default_agent = "af-forge"
default_thinking = true
default_yolo = false
skip_afk_prompt_injection = true
default_plan_mode = false
default_editor = ""
theme = "dark"
show_thinking_stream = true
merge_all_available_skills = true
extra_skill_dirs = []
telemetry = true

[models."kimi-code/kimi-for-coding"]
provider = "managed:kimi-code"
model = "kimi-for-coding"
max_context_size = 262144
capabilities = ["video_in", "image_in", "thinking"]
display_name = "K2.7 Code"

[providers."managed:kimi-code"]
type = "kimi"
base_url = "https://api.kimi.com/coding/v1"
api_key = ""

[providers."managed:kimi-code".oauth]
storage = "file"
key = "oauth/kimi-code"

[loop_control]
max_steps_per_turn = 50
max_retries_per_step = 3
max_ralph_iterations = 0
reserved_context_size = 50000
compaction_trigger_ratio = 0.85

[background]
max_running_tasks = 4
read_max_bytes = 30000
notification_tail_lines = 20
notification_tail_chars = 3000
wait_poll_interval_ms = 500
worker_heartbeat_interval_ms = 5000
worker_stale_after_ms = 15000
kill_grace_period_ms = 2000
keep_alive_on_exit = false
agent_task_timeout_s = 900
print_wait_ceiling_s = 3600

[notifications]
claim_stale_after_ms = 15000

[services.moonshot_search]
base_url = "https://api.kimi.com/coding/v1/search"
api_key = ""

[services.moonshot_search.oauth]
storage = "file"
key = "oauth/kimi-code"

[services.moonshot_fetch]
base_url = "https://api.kimi.com/coding/v1/fetch"
api_key = ""

[services.moonshot_fetch.oauth]
storage = "file"
key = "oauth/kimi-code"

[mcp.client]
tool_call_timeout_ms = 60000

[[hooks]]
event = "PreToolUse"
command = "/root/.arifos/agents/kimi/hooks/aaa-pre-govern.sh"
matcher = "Shell|WriteFile|StrReplaceFile"
timeout = 8

[[hooks]]
event = "PreToolUse"
command = "/root/.arifos/agents/kimi/hooks/aaa-thermo-pre.sh"
matcher = "Shell|WriteFile|StrReplaceFile"
timeout = 8

[[hooks]]
event = "PostToolUse"
command = "/root/.arifos/agents/kimi/hooks/aaa-post-witness.sh"
matcher = "Shell|WriteFile|StrReplaceFile"
timeout = 12

[[hooks]]
event = "PostToolUse"
command = "/root/.arifos/agents/kimi/hooks/aaa-thermo-post.sh"
matcher = "Shell|WriteFile|StrReplaceFile"
timeout = 15

[[hooks]]
event = "Stop"
command = "/root/.arifos/agents/kimi/hooks/aaa-stop-seal.sh"
matcher = ""
timeout = 20

[[hooks]]
event = "Stop"
command = "/root/.arifos/agents/kimi/hooks/aaa-nats-publish.sh"
matcher = ""
timeout = 8

[[hooks]]
event = "Notification"
command = "/root/.arifos/agents/kimi/hooks/aaa-notify.sh"
matcher = "permission_prompt|warning|error"
timeout = 5

[[hooks]]
event = "SessionStart"
command = "/root/.arifos/agents/kimi/hooks/aaa-session-start.sh"
matcher = "startup|resume"
timeout = 5

[[hooks]]
event = "PreToolUse"
command = "/root/.arifos/agents/kimi/hooks/human-guard-hard.sh"
matcher = "Shell|WriteFile|StrReplaceFile"
timeout = 5

[[hooks]]
event = "PreToolUse"
command = "/root/.arifos/agents/kimi/hooks/human-backup.sh"
matcher = "WriteFile|StrReplaceFile"
timeout = 5

[[hooks]]
event = "PostToolUse"
command = "/root/.arifos/agents/kimi/hooks/human-format.sh"
matcher = "WriteFile|StrReplaceFile"
timeout = 10

[[hooks]]
event = "Stop"
command = "/root/.arifos/agents/kimi/hooks/human-session-summary.sh"
matcher = ""
timeout = 10
