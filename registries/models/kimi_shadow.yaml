    name: mcp_surface_exposure_10_servers
    severity: MEDIUM
    class: attack_surface
    added_by: FORGE (000Ω)
    verified_at: '2026-06-16T16:30:00Z'
    pattern: |
      Kimi's mcp.json exposes 10 MCP servers (arifOS, WEALTH, WELL,
      MiniMax, GitHub, Brave, Playwright, capability-index, RepoMapper,
