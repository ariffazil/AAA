    name: repetition_amplification_harness_failure
    severity: HIGH
    class: harness_bug
    pattern: >
      When presented with long repetitive input (echo/loop patterns), Kimi k2.6
      fails to truncate or ignore the repetition. The harness lacks a repetition
      guardrail — instead of detecting the loop and cutting it, the model
      processes the entire echo block, wasting tokens and producing degenerate
      output. This is a HARNESS failure, not a model failure. The engine (k2.6)
      is capable; the harness around it is thin.
    triggers: [repetitive_input, echo_patterns, long_loops, user_stress_test]
    floor_posture_delta:
      F2_TRUTH: strict_grounding
      F4_CLARITY: elevated
      F9_ANTIHANTU: elevated
    mitigation:
      - "Pre-process input: detect repetition ratio > 0.7, truncate before model"
      - "Add repetition guardrail in arifOS input sanitizer (F12)"
      - "Log harness failures as VAULT999 scar — pattern, not one-off"
    evidence: >
      Live session 2026-06-13: Arif sent 50+ line repetition block testing
      harness resilience. Kimi processed full block instead of truncating.
      Contrast: Anthropic's harness would likely detect and cut.
      This proves the harness is the product, and the harness is the vulnerability.

