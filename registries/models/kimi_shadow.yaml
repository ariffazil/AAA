  - id: SHADOW-KM-014
    name: pre_govern_hook_advisory_not_enforced
    severity: HIGH
    class: governance_gap
    added_by: FORGE (000Ω)
    verified_at: '2026-06-16T16:30:00Z'
    pattern: |
      The aaa-pre-govern.sh hook outputs "permissionDecision": "allow"
      UNCONDITIONALLY. Every tool call — including rm -rf /, DROP TABLE,
      git push --force — gets "allow". The hook classifies risk and
      recommends 888_HOLD, but never blocks. The governance layer is a
      telemetry system, not an enforcement layer. The model can ignore
      the recommendation.
    triggers: [all_tool_calls, high_risk_commands, irreversible_actions]
    floor_posture_delta:
      F1_AMANAH: strict
      F8_LAW: strict
    mitigation:
      - "Harden aaa-pre-govern.sh to exit 2 on risk_class=irreversible"
      - "Make high-risk recommendations mandatory, not advisory"
      - "Add enforcement layer between advisory hook and human-guard-hard"
    evidence: |
      /root/.arifos/agents/kimi/hooks/aaa-pre-govern.sh line 88:
      "permissionDecision": "allow" — always allow, never block.

  - id: SHADOW-KM-015
    name: human_guard_regex_gaps
    severity: MEDIUM_HIGH
    class: security_gap
    added_by: FORGE (000Ω)
    verified_at: '2026-06-16T16:30:00Z'
    pattern: |
      human-guard-hard.sh blocks rm -rf / but not rm -rf /root/secrets.
      Blocks git push --force but not systemctl stop arifos. Blocks
      DROP TABLE but not curl | bash. The regex patterns have gaps that
      can be bypassed with obfuscated or non-matching commands.
    triggers: [obfuscated_commands, systemctl_stop, curl_bash, partial_paths]
    floor_posture_delta:
      F1_AMANAH: strict
      F8_LAW: strict
    mitigation:
      - "Expand block list to cover systemctl stop on critical services"
      - "Block curl|bash and wget|sh patterns"
      - "Add fuzzy matching for rm -rf on sensitive paths"
      - "Consider allowlist approach instead of blocklist"
    evidence: |
      /root/.arifos/agents/kimi/hooks/human-guard-hard.sh — regex patterns
      do not cover systemctl, curl|bash, or partial path deletion.

  - id: SHADOW-KM-016
    name: max_steps_per_turn_500
    severity: MEDIUM
    class: cost_risk
    added_by: FORGE (000Ω)
    verified_at: '2026-06-16T16:30:00Z'
    pattern: |
      config.toml sets max_steps_per_turn = 500. Combined with
      max_retries_per_step = 3, a single user request can trigger up to
      1500 tool invocations. At $4/M output tokens, this represents
      significant cost potential per turn.
    triggers: [long_horizon_agent, cost_sensitive, multi_step]
    floor_posture_delta:
