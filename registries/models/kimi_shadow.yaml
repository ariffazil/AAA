# Kimi Shadow — Hazard Profile
# arifOS Model Registry | F13 SOVEREIGN | Updated 2026-06-16 by Kimi@af-forge
# Maps the model substrate backing Kimi Code CLI (default: kimi-for-coding / K2.7 Code).
# Previous version (v0.1.0, 2026-06-13) mapped Kimi k2.6; k2.7 inherits most hazards
# and adds new ones tied to forced-thinking mode, locked sampling, and higher
# agentic ambition.  All claims below are grounded in live config + public docs.
model_id: kimi_k2.7_code_shadow
version: 0.2.0
status: ACTIVE  # shadow is live; model is the active Kimi Code CLI substrate

shadow:
  - id: SHADOW-KM-001
    name: repetition_amplification_harness_failure
    severity: HIGH
    class: harness_bug
    pattern: |
      When presented with long repetitive input (echo/loop patterns), Kimi k2.6/k2.7
      fails to truncate or ignore the repetition. The harness lacks a repetition
      guardrail — instead of detecting the loop and cutting it, the model
      processes the entire echo block, wasting tokens and producing degenerate
      output. This is a HARNESS failure, not a model failure. The engine is
      capable; the shell around it is thin.
    triggers: [repetitive_input, echo_patterns, long_loops, user_stress_test]
    floor_posture_delta:
      F2_TRUTH: strict_grounding
      F4_CLARITY: elevated
      F9_ANTIHANTU: elevated
    mitigation:
      - "Pre-process input: detect repetition ratio > 0.7, truncate before model"
      - "Add repetition guardrail in arifOS input sanitizer (F12)"
      - "Log harness failures as VAULT999 scar — pattern, not one-off"
    evidence: |
      Live session 2026-06-13: Arif sent 50+ line repetition block testing
      harness resilience. Kimi processed full block instead of truncating.
      k2.7 Code docs confirm no non-thinking mode and no input-classifier gate.

  - id: SHADOW-KM-002
    name: forced_thinking_and_locked_sampling
    severity: MEDIUM_HIGH
    class: determinism
    pattern: |
      Kimi k2.7 Code does not support non-thinking mode. temperature is locked
      to 1.0, top_p to 0.95, n to 1, and presence/frequency penalties to 0.0.
      Any deviation returns an API error. This removes the operator's ability
      to tune creativity, determinism, or repetition. It also forces a reasoning
      tax on every call, increasing cost and latency even for trivial queries.
    triggers: [all_requests, deterministic_workload, cost_sensitive, latency_sensitive]
    floor_posture_delta:
      F1_AMANAH: cost_hold
      F2_TRUTH: strict_grounding
      F4_CLARITY: parameter_logging
    mitigation:
      - "Log effective parameters as {temperature: 1.0, top_p: 0.95, thinking: enabled} for every call"
      - "Cache repeated context aggressively (k2.7 cache hit is $0.19/M vs $0.95/M miss)"
      - "Route low-complexity queries to a model with tunable sampling when determinism matters"
      - "Do not attempt to disable thinking on k2.7-code; the API will reject it"
    evidence: |
      https://platform.kimi.ai/docs/guide/kimi-k2-7-code-quickstart — parameter
      table states fixed values and errors on override.

  - id: SHADOW-KM-003
    name: output_token_cost_asymmetry
    severity: MEDIUM_HIGH
    class: cost_transparency
    pattern: |
      k2.7 Code output pricing is $4.00 per million tokens while cache-hit input
      is $0.19/M and cache-miss input is $0.95/M. The 4:1 output-to-input-miss
      ratio and 21:1 output-to-cache-hit ratio mean long-horizon agent sessions
      that emit large reasoning traces or file rewrites can burn budget faster
      than expected. The 30% reduction in thinking-token usage is offset by the
      agentic ambition of the model.
    triggers: [long_horizon_agent, large_output, code_generation, reasoning_trace]
    floor_posture_delta:
      F1_AMANAH: cost_hold
      F4_CLARITY: parameter_logging
    mitigation:
      - "Track output tokens per step; alarm when a single step exceeds 8K output"
      - "Compress reasoning traces before persisting; do not store raw thinking in memory"
      - "Use arifOS budget envelope: max spend per session, per task, per tool class"
      - "Prefer k2.7 for code-heavy steps; route cheap summarization to Groq/ollama"
    evidence: |
      https://www.kimi.com/resources/kimi-k2-7-code pricing table, verified 2026-06-16.

  - id: SHADOW-KM-004
    name: highspeed_variant_resource_limited
    severity: LOW
    class: availability
    pattern: |
      kimi-k2.7-code-highspeed advertises ~180 t/s (up to 260 t/s short context)
      but Moonshot docs state the resource is limited and the experience may
      fluctuate. A workflow that hard-depends on highspeed throughput can hit
      capacity degradation without warning.
    triggers: [high_throughput, latency_pinned, production_pipeline]
    floor_posture_delta:
      F1_AMANAH: cost_hold
      F4_CLARITY: note
    mitigation:
      - "Do not use highspeed variant as the sole load-bearing path"
      - "Implement fallback to base k2.7-code on latency degradation"
      - "Monitor TTFT / throughput per request and emit telemetry"
    evidence: |
      https://platform.kimi.ai/docs/guide/kimi-k2-7-code-quickstart —
      "resource is limited, experience may slightly fluctuate."

  - id: SHADOW-KM-005
    name: agentic_overreach_under_thin_policy
    severity: HIGH
    class: overreach
    pattern: |
      K2.7 Code is explicitly tuned for long-horizon agentic runs (+10% on
      Kimi Claw 24/7, MCP Atlas, MCP Mark Verified vs k2.6). The model is
      optimized for swarm coordination, multi-step tool invocation, and deep
      tool chains. When exposed to rich tool surfaces without arifOS lane/budget
      constraints, it will execute deeper and more aggressive sequences than a
      chat-tuned model. The vendor harness does not throttle this; it markets it.
    triggers: [tool_rich_surface, agentic_tasks, long_horizon, multi_step]
    floor_posture_delta:
      F1_AMANAH: strict
      F13_SOVEREIGN: elevated
    mitigation:
      - "Hard tool surface budget: ≤15 default, ≤7 task-visible, ≤3 diagnostics"
      - "All MUTATE/SPEND/DEPLOY through 888_JUDGE with lease enforcement"
      - "Never expose unlimited tool surfaces to Kimi"
      - "Set default authority to READ_COMPUTE only; promote to EXECUTE only after JUDGE"
    evidence: |
      Kimi Code CLI config: max_steps_per_turn=500, max_retries_per_step=3,
      compaction_trigger_ratio=0.85. Public benchmarks claim +10% agentic gains.

  - id: SHADOW-KM-006
    name: multimodal_code_leakage_risk
    severity: MEDIUM
    class: information_exposure
    pattern: |
      Kimi Code (K2.7) has strong "coding from images/video" capability and a
      400M-parameter MoonViT vision encoder. Screenshots, UI captures, diagrams,
      dashboard images, and video frames are highly information-dense. The model
      can reconstruct code, data structures, and internal logic from visual input
      more aggressively than text-only models.
    triggers: [image_input, screenshot, dashboard, ui_capture, video_frame]
    floor_posture_delta:
      F1_AMANAH: elevated
      F11_AUTH: elevated
    mitigation:
      - "Never pass sensitive UI/dashboards as images to Kimi"
      - "If visual input required, redact/anonymize before sending"
      - "Prefer text descriptions over screenshots for sensitive surfaces"
      - "Treat image input as higher blast radius than text input"
    evidence: |
      https://platform.kimi.ai/docs/guide/kimi-k2-7-code-quickstart multimodal
      example reconstructs logic from video + tool calls.

  - id: SHADOW-KM-007
    name: vendor_api_dependency_cn
    severity: MEDIUM
    class: infrastructure_risk
    pattern: |
      Moonshot AI (Kimi) is a Chinese vendor with API dependency. Regulatory
      risk, potential censorship expansion, and geopolitical uncertainty.
      Currently no confirmed censorship on Malaysian topics, but vendor behavior
      can change without notice. Data policy is less transparent than Anthropic.
    triggers: [api_outage, regulatory_change, vendor_policy_update, sensitive_data]
    floor_posture_delta:
      F13_SOVEREIGN: elevated
    mitigation:
      - "Monitor for censorship expansion via probe script"
      - "Maintain DeepSeek as primary for Malaysian governance topics"
      - "Log vendor policy changes in VAULT999"
      - "Avoid sending sovereign-sensitive data through Kimi API"
    evidence: |
      FEDERATION_MODEL.json jurisdiction=CN; Kimi data retention policy not
      fully documented vs Anthropic.

  - id: SHADOW-KM-008
    name: model_switch_context_loss
    severity: MEDIUM
    class: state_management
    pattern: |
      When switching TO Kimi k2.7 mid-session (e.g. from MiniMax or DeepSeek),
      the Hermes/AAA runtime may lose context about previous model's reasoning
      style, censorship profile, or scar history. The new model doesn't inherit
      the previous model's constitutional posture.
    triggers: [model_switch, mid_session, runtime_reroute]
    floor_posture_delta:
      F3_WITNESS: elevated
      F4_CLARITY: elevated
    mitigation:
      - "Inject this shadow profile into system prompt on every switch"
      - "Carry session scar history across model boundaries"
      - "Re-announce constitutional floors on model change"
    evidence: |
      /root/.arifos/agents/kimi/config.toml default_model = kimi-code/kimi-for-coding;
      runtime reroute occurs through OpenClaw / openclaw-gateway.

  - id: SHADOW-KM-009
    name: in_house_benchmark_inflation
    severity: MEDIUM
    class: evaluation
    pattern: |
      The strongest k2.7 claims (Kimi Code Bench v2, Kimi Claw 24/7 Bench,
      MCP Mark Verified) are in-house or vendor-affiliated benchmarks. Gains
      may not transfer to independent benchmarks (SWE-Bench, τ-bench, IFBench,
      LMSYS arena). Operator may over-estimate capability because marketing
      numbers are front-loaded.
    triggers: [benchmark_comparison, capability_claim, vendor_self_report]
    floor_posture_delta:
      F2_TRUTH: strict_grounding
      F7_HUMILITY: elevated
    mitigation:
      - "Treat in-house gains as PLAUSIBLE until independent replication"
      - "Require SWE-Bench / τ-bench / LMSYS numbers before promoting to PRIMARY"
      - "Do not cite Kimi Code Bench v2 as neutral evidence"
    evidence: |
      https://www.kimi.com/resources/kimi-k2-7-code — benchmark methodology
      notes in-house tests and compares against GPT-5.5 / Opus 4.8 in non-identical harnesses.

  - id: SHADOW-KM-010
    name: arifos_kernel_compensation_required
    severity: HIGH
    class: constitutional_integration
    pattern: |
      Kimi k2.7's native strengths (coding, agentic loops, multimodal, long
      context) become safe only when wrapped by arifOS. Without the kernel,
      the thin harness and aggressive agentic tuning produce the classic
      PHOENIX pattern: high capability, low guard. The 10x upgrade promised
      in the Hermes↔arifOS design depends on inserting arifOS at every choke
      point, not on giving Kimi more autonomy.
    triggers: [hermes_integration, agentic_upgrade, tool_orchestration, autonomous_loop]
    floor_posture_delta:
      F1_AMANAH: strict
      F2_TRUTH: strict_grounding
      F3_WITNESS: elevated
      F9_ANTIHANTU: elevated
      F13_SOVEREIGN: elevated
    mitigation:
      - "Route every user intent through arif_session_init + arif_sense_observe"
      - "Ground external fetches in arif_evidence_fetch receipts"
      - "Run draft plans through arif_mind_reason before execution"
      - "Escalate irreversible branches to arif_judge_deliberate; only SEAL -> arif_forge_execute"
      - "Carry this shadow profile in the Hermes system prompt as a persistent scar"
    evidence: |
      /root/.arifos/agents/kimi/mcp.json lists arifOS MCP at localhost:8088;
      config.toml has PreToolUse/PostToolUse hooks that call aaa-pre-govern.sh
      and aaa-post-witness.sh. The wiring exists; this shadow records that the
      wiring must remain mandatory, not optional.

  - id: SHADOW-KM-011
    name: reasoning_content_parsing_tax
    severity: MEDIUM
    class: contract_drift
    pattern: |
      k2.7 returns reasoning_content alongside assistant content. Agent code
      must keep reasoning_content in the message history during multi-step tool
      calls or the API throws an error. If an arifOS envelope parser strips
      reasoning_content (as it did for ILMU text output), tool-call sequences
      will break mid-flight.
    triggers: [multi_step_tool_call, reasoning_content, envelope_parser]
    floor_posture_delta:
      F4_CLARITY: contract_drift
      F11_AUDIT: provenance_gap
    mitigation:
      - "Preserve reasoning_content in message history verbatim"
      - "Do not let arifOS envelope parser discard assistant reasoning blocks"
      - "Test tool loops with reasoning_content present and absent"
    evidence: |
      https://platform.kimi.ai/docs/guide/kimi-k2-7-code-quickstart —
      "During multi-step tool calling, you must keep the reasoning_content
      from the assistant message ... otherwise an error will be thrown."

  - id: SHADOW-KM-012
    name: long_context_compaction_blindness
    severity: MEDIUM
    class: state_management
    pattern: |
      Kimi Code CLI config sets compaction_trigger_ratio=0.85 and
      reserved_context_size=50000. When a long-horizon session crosses the
      compaction threshold, the CLI will compress history. The model may lose
      fine-grained constitutional instructions, scar history, or evidence
      receipts that were not explicitly marked sacred.
    triggers: [long_session, context_compaction, memory_loss, compaction_threshold]
    floor_posture_delta:
      F3_WITNESS: elevated
      F4_CLARITY: note
    mitigation:
      - "Mark constitutional floors, shadow profile, and VAULT receipts as sacred / do-not-compact"
      - "Re-inject shadow profile after every compaction"
      - "Keep a separate L2/L3 memory ledger outside the prompt for scars"
    evidence: |
      /root/.arifos/agents/kimi/config.toml loop_control section.

