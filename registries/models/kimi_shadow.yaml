  - id: SHADOW-KM-017
    name: skip_afk_prompt_injection
    severity: MEDIUM
    class: autonomy_risk
    added_by: FORGE (000Ω)
    verified_at: '2026-06-16T16:30:00Z'
    pattern: |
      config.toml sets skip_afk_prompt_injection = true. This enables
      unattended long-running sessions without periodic human check-in.
      Combined with max_steps_per_turn=500 and background.max_running_tasks=4,
      Kimi can run 2000 tool calls across 4 background tasks with no
