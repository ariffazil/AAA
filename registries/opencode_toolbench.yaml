launcher_scripts:
- name: github-official
  path: /root/.opencode/mcp-launchers/github-official.sh
  description: 'OpenCode variant of GitHub MCP (uses gh auth token, toolsets: context,repos,issues,pull_requests,users)'
- name: repomapper
  path: /root/.opencode/mcp-launchers/repomapper.sh
  description: RepoMapper with isolated venv at /root/venvs/repomapper
- name: serena
  path: /root/.opencode/mcp-launchers/serena.sh
  description: Serena MCP in no-memories mode (read-only enforcement)
env_var_audit:
  loaded_from: /root/.secrets/vault.env (17 vars)
  in_config_but_empty:
  - ARIFOS_MCP_TOKEN
  - EXA_API_KEY
  - GITHUB_PERSONAL_ACCESS_TOKEN
  - BRAVE_SEARCH_API_KEY
  - ANTHROPIC_API_KEY
  - DEEPSEEK_API_KEY
  in_config_and_loaded:
  - MINIMAX_API_KEY
  f13_territory: true
  note: Some MCP servers (arifOS, Exa, GitHub, Brave) reference env vars that are not in vault.env. The
    .env source path is /root/.env (mode 644) — should be hardened or migrated to vault.env
constitutional_binding:
  F1_AMANAH: Reversible-first. Irreversible actions require ack_irreversible=true (e.g. arif_forge_execute).
  F2_TRUTH: Evidence-grounded. P(truth)≥0.99 for SEAL.
  F7_HUMILITY: omega_0 ∈ [0.03, 0.05]. Honesty ratio observable via arif_kernel_route(mode=status).
  F9_ANTIHANTU: C_dark ≤ 0.30. No consciousness/feeling claims in any tool output.
  F11_AUDIT: Every tool call logged to arifosmcp_tool_calls (Supabase L4) with actor_id + session_id.
  F13_SOVEREIGN: Arif's veto is absolute. 888_HOLD gate on irreversible actions.
