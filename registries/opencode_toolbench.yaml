model_strategy:
  top_level:
    model: deepseek/deepseek-v4-pro
    small_model: minimax/MiniMax-M3
    rationale: deepseek for reasoning, minimax for cheap fallback. No native 'fallback' field in opencode
      1.17.4 — small_model is the closest equivalent.
  per_agent:
    architect: deepseek (strong reasoning for design)
    rsi: deepseek (deterministic measurement)
    integrator: minimax (cheap + fast for build iterations, ~60% cost savings)
    final: deepseek (judgement must be stable, no cheap-model shortcuts)
  cycle_patterns:
    in_session: Use variant_cycle keybind to switch between 'high' and 'fast' variants per model
    between_sessions: 'Edit opencode.json ''model'' field, or pass -m flag: `opencode run -m minimax/MiniMax-M3
      ...`'
    fallback_when_deepseek_fails: 1. Try /models to switch interactively, 2. Restart with `opencode -m
      minimax/MiniMax-M3`
    on_vendor_402_insufficient_balance: Restart with fallback model via -m flag
  variants_configured:
    deepseek/deepseek-v4-pro:
    - high
    - fast
    minimax/MiniMax-M3:
    - high
    - fast
