$schema: ../schemas/opencode-toolbench.schema.json
version: 1
last_forged: '2026-06-16T16:30:00Z'
forged_by: Codex RSI/Forge
opencode_version: 1.17.7
opencode_binary: /usr/local/bin/opencode
config_paths:
  root_config: /root/AAA/ROOT_AGENT_CONFIG.yaml
  live_global: /root/.config/opencode/opencode.json
  repo_view: /root/AAA/agents/opencode/config/config.yaml
  global_legacy: /root/.opencode/opencode.json (retired; absent on 2026-06-16)
  workspace_skills: /root/.opencode/skills/
  workspace_tools: /root/.opencode/tools/
  workspace_launchers: /root/.opencode/mcp-launchers/
  external_skills_mirrored:
  - /root/.agents/skills/
  - /root/.claude/skills/
discovery_precedence:
- 1. Built-in 'customize-opencode' skill (in opencode binary)
- '2. ~/.claude/skills/**/SKILL.md (Claude Code mirror, disable: flags.disableClaudeCodeSkills)'
- 3. ~/.agents/skills/**/SKILL.md (generic agent skills)
- 4. Walk up from directory → worktree looking for .claude/ and .agents/
- 5. config directories ({skill,skills}/**/SKILL.md under any .opencode/)
- 6. config.skills.paths[] (explicit paths)
- 7. config.skills.urls[] (remote /.well-known/skills/ discovery)
- — last-wins on duplicates, with 'duplicate skill name' warning —
