# MCP Servers organized by agent ownership

servers:

  # === ARIFOS CORE (arifOS constitutional MCP) ===
  arifos-local:
    agent: arifOS
    type: local
    command: python
    args: ["-m", "arifosmcp.runtime", "stdio"]
    cwd: C:\ariffazil\arifOS
    env:
      PYTHONPATH: C:\ariffazil\arifOS
      PYTHONIOENCODING: utf-8
    enabled: true
    auto_start: true
    approval_policy: trusted
    variants:
      kimi:
        env:
          ARIFOS_GOVERNANCE_SECRET: "${ARIFOS_GOVERNANCE_SECRET}"
          ARIFOS_GOVERNANCE_OPEN_MODE: "1"
          AAA_MCP_TRANSPORT: stdio
      gemini:
        env:
          ARIFOS_VAULT_PATH: C:\ariffazil\arifOS\VAULT999
          ARIFOS_MODE: development
      antigravity:
        env:
          ARIFOS_VAULT_PATH: C:\ariffazil\arifOS\arifosmcp\VAULT999
          ARIFOS_CONSTITUTIONAL_MODE: AAA
          ARIFOS_GOVERNANCE_SECRET: "${ARIFOS_GOVERNANCE_SECRET}"

  arifos-remote:
    agent: arifOS
    type: remote
    serverUrl: https://mcp.arif-fazil.com/mcp
    enabled: true
    auto_start: false
    approval_policy: on-demand

  # === GEOX (Earth domain) ===
  geox:
    agent: GEOX
    type: local
    command: python
    args: [src/geox_mcp/server.py]
    cwd: C:\ariffazil\GEOX
    env:
      PYTHONPATH: C:\ariffazil\GEOX\src
      PYTHONIOENCODING: utf-8
    enabled: true
    auto_start: true
    approval_policy: trusted

  # === WEALTH (Capital domain) ===
  wealth:
    agent: WEALTH
    type: remote
    serverUrl: https://wealth.arif-fazil.com/mcp
    enabled: true
    auto_start: false
    approval_policy: on-demand

  # === WELL (Human domain) ===
  well:
    agent: WELL
    type: remote
    serverUrl: https://well.arif-fazil.com/mcp
    enabled: true
    auto_start: false
    approval_policy: on-demand

  # === A-FORGE (Builder agent) ===
  a-forge:
    agent: A-FORGE
    type: local
    command: node
    args: [C:\ariffazil\A-FORGE\dist\src\mcp\cli.js, serve, --transport, stdio]
    env:
      NODE_ENV: development
      ARIFOS_GOVERNANCE_URL: https://mcp.arif-fazil.com/mcp
    enabled: true
    auto_start: true
    approval_policy: trusted
    Antigravity:
      path: C:\ariffazil\A-FORGE\dist\src\mcp\cli.js

  # === Standard MCP Servers (shared across agents) ===
