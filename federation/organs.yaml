# ═══════════════════════════════════════════════════════════════════
# AAA Federation — Canonical Organ Registry
# ═══════════════════════════════════════════════════════════════════
# Single source of truth for organ topology, roles, and boundaries.
# Every organ.yaml in individual repos MUST be consistent with this.
# ═══════════════════════════════════════════════════════════════════

schema_version: 1
generated: "2026-07-19"
maintainer: "AAA Control Plane"

organs:
  - organ: arifos
    repo: ariffazil/arifos
    role: governance_kernel
    authority_ceiling: JUDGE_ONLY
    port: 8088
    default_branch: main
    runtime: python-3.12
    interfaces:
      mcp_manifest: arifosmcp/tool_registry.json
      health: /health
    owned_domains:
      - constitutional_judgment
      - session_identity
      - floor_enforcement
      - vault999_seal
    forbidden_domains:
      - engineering_execution
      - earth_evidence
      - capital_allocation
      - human_diagnosis
    build:
      command: uv sync --frozen && pytest tests/ -q --tb=short
      test: pytest tests/ -q --tb=short
      lint: ruff check . && ruff format --check .
      artifact: wheel

  - organ: a-forge
    repo: ariffazil/A-FORGE
    role: execution_actuator
    authority_ceiling: EXECUTE_AFTER_SEAL
    port: 7071
    mcp_port: 7072
    default_branch: main
    runtime: node-22
    interfaces:
      mcp_manifest: contracts/mcp-surface.json
      health: /health
    owned_domains:
      - engineering_execution
      - build_deploy
      - shell_orchestration
      - reusable_workflows
    forbidden_domains:
      - constitutional_judgment
      - self_authorization
      - earth_evidence
      - capital_allocation
    build:
      command: npm ci && npm run build
      test: npm test
      artifact: dist/

  - organ: aaa
    repo: ariffazil/AAA
    role: control_plane
    authority_ceiling: DISPLAY_ONLY
    port: 3001
    default_branch: main
    runtime: node-22
    interfaces:
      registry: federation/organs.yaml
      schemas: federation/*.schema.json
    owned_domains:
      - federation_registry
      - a2a_routing
      - cockpit_display
      - schema_validation
    forbidden_domains:
      - constitutional_judgment
      - engineering_execution
      - earth_evidence
      - capital_allocation
    build:
      command: npm ci && npm run build
      test: npm run lint && npm run build
      artifact: dist/

  - organ: geox
    repo: ariffazil/geox
    role: domain_evidence
    authority_ceiling: COMPUTE_ONLY
    port: 8081
    default_branch: main
    runtime: python-3.12
    interfaces:
      mcp_manifest: contracts/mcp-surface.json
