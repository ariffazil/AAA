      - basin
    forbidden_domains:
      - constitutional_judgment
      - capital_allocation
      - deployment_authorization
    build:
      command: pip install -e ".[dev]" && PYTHONPATH=src pytest tests/ -q
      test: PYTHONPATH=src pytest tests/ -q
      lint: ruff check . && ruff format --check .
      artifact: wheel

