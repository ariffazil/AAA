  - /root/AAA/skills
  - /root/.hermes/skills
  template_vars: true
  inline_shell: false
  inline_shell_timeout: 10
  guard_agent_created: false
honcho: {}
timezone: ''
discord:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  auto_thread: true
  reactions: true
  channel_prompts: {}
  server_actions: ''
whatsapp: {}
telegram:
  channel_prompts: {}
slack:
  channel_prompts: {}
mattermost:
  channel_prompts: {}
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
command_allowlist:
- SQL DROP
- overwrite system file via tee
- delete in root path
- copy/move file into /etc/
- git force push (rewrites remote history)
- overwrite system config
- find -delete
- git reset --hard (destroys uncommitted changes)
- stop/restart system service
- shell command via -c/-lc flag
- script execution via -e/-c flag
- recursive delete
- git branch force delete
- in-place edit of system config
- script execution via heredoc
quick_commands: {}
hooks: {}
hooks_auto_accept: false
personalities: {}
security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
  website_blocklist:
    enabled: false
    domains: []
    shared_files: []
cron:
  wrap_response: true
  max_parallel_jobs: null
  enabled: true
code_execution:
  mode: project
logging:
  level: info
  max_size_mb: 5
  backup_count: 3
  path: /root/.hermes/logs
  max_size: 100MB
  max_files: 10
network:
  force_ipv4: false
sessions:
  auto_prune: false
  retention_days: 90
  vacuum_after_prune: true
  min_interval_hours: 24
_config_version: 22
messaging:
  telegram:
    enabled: true
    mode: polling
    dm_policy: allowlist
    allow_from: []
    group_policy: disabled
    thread_bindings:
      enabled: true
      idle_hours: 168
      max_age_hours: 720
  discord:
    enabled: false
  slack:
    enabled: false
  whatsapp:
    enabled: false
  signal:
    enabled: false
tools:
  enabled:
  - web_search
  - browser
  - file_read
  - docker_inspect
  - logs
  - health_check
  - mcp_call
  disabled:
  - file_write
  - terminal_execute
  - docker_rm
  - docker_prune
mcp:
  enabled: true
  servers:
    arifosmcp:
      name: arifosmcp
      url: http://127.0.0.1:8080
      transport: streamable-http
      timeout: 30
    geoxmcp:
      name: geoxmcp
      url: http://127.0.0.1:8081
      transport: streamable-http
      timeout: 30
context_compression:
  enabled: true
  threshold: 50%
  target_ratio: 20%
  protect_last: 20
  model: auto

# ── Fallback Model ────────────────────────────────────────────────────
# Automatic provider failover when primary is unavailable.
# Uncomment and configure to enable. Triggers on rate limits (429),
# overload (529), service errors (503), or connection failures.
#
# Supported providers:
#   openrouter   (OPENROUTER_API_KEY)  — routes to any model
#   openai-codex (OAuth — hermes auth) — OpenAI Codex
#   nous         (OAuth — hermes auth) — Nous Portal
#   zai          (ZAI_API_KEY)         — Z.AI / GLM
#   kimi-coding  (KIMI_API_KEY)        — Kimi / Moonshot
#   kimi-coding-cn (KIMI_CN_API_KEY)   — Kimi / Moonshot (China)
#   minimax      (MINIMAX_API_KEY)     — MiniMax
#   minimax-cn   (MINIMAX_CN_API_KEY)  — MiniMax (China)
#
# For custom OpenAI-compatible endpoints, add base_url and key_env.
#
# fallback_model:
#   provider: openrouter
#   model: anthropic/claude-sonnet-4
