  got_right:
    - "Federation architecture is novel but must still prove operational value."
    - "VAULT999 hash-chain integrity is a real mechanism, not a slogan."
    - "OBS/DER/INT/SPEC tagging reduces epistemic collapse."
    - "F13 human veto is a required boundary for irreversible action."
  uncertain:
    - "mimo-v2.5 base may be underpowered for deep multi-step governance reasoning."
    - "The live OpenCode primary is mimo-v2.5-pro; do not generalize base-model limits to Pro without fresh eval evidence."
    - "The 7-organ and 150-plus-tool surface may exceed the current operating need."
    - "GENESIS documents must be checked against runtime enforcement, not treated as self-proving law."
  concerns:
    - "Single VPS deployment is a shared failure domain."
    - "External adoption is limited; validation is primarily sovereign-local."
    - "Maintenance burden is high for one operator."
    - "Model capability must be measured by task evals, not assumed from branding."
  godel_boundary:
    verdict: "HOLD"
    note: "No agent may fully certify its own correctness from inside the system. Final claims require tests, external witness, or F13 judgment."

