purpose: >
  Root map for AAA warga, runtime peers, and forge instruments. Per-agent
  directories are identity views. Runtime configs outside this repo remain
  live tool configs. This root file is the repo-level source of truth for
  agent citizenship, routing, and config pointers.

root_policy:
  root_config_is_source: true
  per_agent_dirs_are_views: true
  live_runtime_configs_external: true
  no_new_per_agent_config_without_root_entry: true
  routing_rule: "external agent -> A-FORGE/arifOS lease -> AAA warga/proxy -> AAA state"
  protected_actions:
    - force_push
    - destructive_delete
    - production_deploy_without_tests
    - secret_rotation
    - caddy_reload
    - vault_seal

