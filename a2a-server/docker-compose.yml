# docker-compose.yml — AAA A2A Gateway
services:
  aaa-a2a:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aaa-a2a
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3001
      - A2A_TOKEN=aaa-a2a-token-dev
      - A2A_API_KEY=aaa-a2a-apikey-dev
      - HERMES_A2A_URL=http://127.0.0.1:18001
      - OPENCLAW_A2A_URL=http://127.0.0.1:18002
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
